<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>404 | MediaNet</title>
    
    <!-- Tailwind CSS -->
    <script src="script.js"></script>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="fontawesome/fontawesome/css/all.min.css">

    <!-- Fonts -->
    <link href="css/font.css" rel="stylesheet">

    <style>
        :root {
            --bg-main: #0f1014;
            --primary: #1bd68e;
            --shadow-color: rgba(0, 0, 0, 0.8);
        }

        body {
            font-family: 'Readex Pro', sans-serif;
            background-color: var(--bg-main);
            color: white;
            overflow-x: hidden;
            height: 100vh;
        }

        /* الخلفية السينمائية */
        .cinematic-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            /* صورة غابة مظلمة وضبابية */
            background-image: url('image.jpeg'); 
            background-size: cover;
            background-position: center;
            z-index: -1;
            /* فلتر لتغميق الصورة وإعطائها لمسة خضراء خفيفة */
            filter: grayscale(80%) sepia(20%) hue-rotate(100deg) brightness(0.6) contrast(1.2);
        }

        /* التدرج اللوني (Vignette) لدمج الصورة مع الخلفية */
        /* هذا الجزء هو السر في جعل التصميم يشبه نيتفليكس */
        .overlay-gradient {
            position: absolute;
            inset: 0;
            background: radial-gradient(
                circle at 30% 50%, 
                transparent 0%, 
                rgba(15, 16, 20, 0.4) 40%, 
                rgba(15, 16, 20, 0.9) 80%, 
                #0f1014 100%
            );
            z-index: 0;
        }

        /* للموبايل: تدرج مختلف ليكون النص مقروءاً في الأسفل */
        @media (max-width: 768px) {
            .overlay-gradient {
                background: linear-gradient(
                    to bottom,
                    rgba(15, 16, 20, 0.2) 0%,
                    rgba(15, 16, 20, 0.6) 50%,
                    #0f1014 90%
                );
            }
            .cinematic-bg {
                background-position: 70% center; /* تحريك الصورة قليلاً في الموبايل */
            }
        }

        /* نص 404 العملاق */
        .text-shadow-glow {
            text-shadow: 0 0 30px rgba(255, 255, 255, 0.1);
            margin-top: 60px;
        }
        
        .nav-link {
            transition: color 0.3s ease;
        }
        .nav-link:hover {
            color: var(--primary);
        }
    </style>
</head>
<body class="flex flex-col h-full relative">

    <!-- الخلفية -->
    <div class="cinematic-bg"></div>
    <div class="overlay-gradient"></div>

    <!-- الشريط العلوي (شعار وقوائم) -->
    <!-- تم تصميمه ليشبه الهيدر الموجود في صفحة 404 الخاصة بنتفليكس -->
    <header class="absolute top-0 w-full z-50 px-6 py-6 flex justify-between items-center">
        <!-- الشعار -->
        <div class="text-3xl font-black text-[#1bd68e] tracking-tighter cursor-pointer drop-shadow-lg">
            MediaNet
        </div>
        
        <!-- روابط بسيطة (اختياري) -->
        <nav class="hidden md:flex gap-6 text-sm font-medium text-gray-300">
            <a href="index.html" class="nav-link">الرئيسية</a>
            <a href="#" class="nav-link">الأفلام</a>
            <a href="#" class="nav-link">المسلسلات</a>
        </nav>
    </header>

    <!-- المحتوى الرئيسي -->
    <main class="relative z-10 flex-1 flex flex-col justify-center px-6 md:px-16 lg:px-24 w-full h-full">
        
        <div class="max-w-2xl mt-32 md:mt-0 animate-fade-in-up">
            <!-- العنوان العملاق -->
            <h1 class="text-7xl md:text-9xl font-black text-white mb-2 tracking-tighter text-shadow-glow">
                404
            </h1>
            
            <!-- الرسالة السينمائية -->
            <h2 class="text-3xl md:text-5xl font-bold text-white mb-6 leading-tight">
                يبدو أنك دخلت<br>
                <span class="text-[#1bd68e]">البُعد المجهول.</span>
            </h2>
            
            <p class="text-lg md:text-xl text-gray-300 mb-10 max-w-lg font-light leading-relaxed">
                عذراً، الصفحة التي تحاول الوصول إليها قد تكون اختفت في الظلام، أو أن الرابط الذي اتبعته لم يعد موجوداً في عالمنا.
            </p>
            
            <!-- زر الإجراء الرئيسي -->
            <a href="index.html" class="inline-flex items-center gap-3 bg-[#1bd68e] text-black px-8 py-3.5 rounded-lg font-bold text-lg hover:bg-[#15b576] transition-all transform hover:scale-105 shadow-[0_0_20px_rgba(27,214,142,0.4)]">
                <span>العودة للصفحة الرئيسية</span>
                <i class="fa-solid fa-arrow-left"></i>
            </a>

            <!-- كود الخطأ الصغير في الأسفل -->
            <div class="mt-12 text-gray-500 font-mono text-sm border-r-2 border-[#1bd68e] pr-3 opacity-60">
                Error Code: <strong>NSES-404</strong>
            </div>
        </div>

    </main>

    <!-- تأثيرات حركة بسيطة -->
    <style>
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in-up {
            animation: fadeInUp 0.8s ease-out forwards;
        }
    </style>
</body>
</html>
