        .video-js.vjs-theme-ultra { font-family: 'Readex Pro', sans-serif; color: var(--p); border-radius: 12px; overflow: hidden; }
        .vjs-theme-ultra .vjs-big-play-button { 
            background: rgba(27, 214, 142, 0.85) !important; border: none !important; border-radius: 50% !important; 
            width: 70px !important; height: 70px !important; line-height: 700px !important; top: 50% !important; left: 50% !important;

        /* Custom Animations */

        .scrollbar-hide::-webkit-scrollbar { display: none; }

        .thumb-progress { position: absolute; bottom: 0; left: 0; height: 3px; background: #222; width: 100%; overflow: hidden; }

        /* Speed Overlay */

        /* حالة السحب: تعطيل الانميشن لتتبع الإصبع */

        .hero-mask { background: linear-gradient(to top, #050608 0%, rgba(5, 6, 8, 0.8) 40%, transparent 100%); }
        .side-mask { background: linear-gradient(to left, #050608 0%, rgba(5, 6, 8, 0.4) 50%, transparent 100%); }

        .slide {
            transition: opacity 0.5s ease;

        /* تنسيق النقاط */

            background-color: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.1);

        .slide-in-rtl {

        @keyframes slideInRTL {
            from {

            to {
                opacity: 1;

        /* ===== مشغل UltraTV - تصميم متكامل ===== */
.ultra-player-container {
    position: relative;
    width: 100%;
    background: black;
    direction: ltr; /* مهم لمفاتيح التحكم */
}

/* شاشة البداية (Poster) */
.ultra-poster {
    position: absolute;
    inset: 0;
    background-size: cover;
    background-position: center;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 10;
    transition: opacity 0.3s;
}

.ultra-poster.hidden {
    opacity: 0;
    pointer-events: none;
}

.ultra-big-play {
    width: 90px;
    height: 90px;
    background: rgba(27, 214, 142, 0.9);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: all 0.2s;
    box-shadow: 0 0 30px rgba(27, 214, 142, 0.5);
}

.ultra-big-play i {
    font-size: 40px;
    color: black;
    margin-left: 5px; /* تعويض لوسط الزر */
}

.ultra-big-play:hover {
    transform: scale(1.1);
    background: #fff;
}

.ultra-big-play:hover i {
    color: #1bd68e;
}

/* شريط التحكم الرئيسي */
.ultra-controls {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    background: linear-gradient(transparent, rgba(0,0,0,0.9));
    padding: 20px 20px 15px;
    z-index: 20;
    opacity: 0;
    transition: opacity 0.3s;
    pointer-events: none;
}

.ultra-player-container.show-controls .ultra-controls,
.ultra-player-container:hover .ultra-controls {
    opacity: 1;
    pointer-events: all;
}

/* شريط التقدم */
.ultra-progress-container {
    width: 100%;
    margin-bottom: 15px;
    cursor: pointer;
    position: relative;
    height: 5px;
}

.ultra-progress-bg {
    width: 100%;
    height: 5px;
    background: rgba(255,255,255,0.2);
    border-radius: 10px;
    position: relative;
    overflow: hidden;
}

.ultra-progress-fill {
    height: 100%;
    background: #1bd68e;
    border-radius: 10px;
    position: relative;
    width: 0%;
    transition: width 0.1s linear;
}

.ultra-progress-buffered {
    position: absolute;
    top: 0;
    left: 0;
    height: 100%;
    background: rgba(255,255,255,0.4);
    border-radius: 10px;
    width: 0%;
}

.ultra-progress-handle {
    width: 13px;
    height: 13px;
    background: #1bd68e;
    border-radius: 50%;
    position: absolute;
    top: 50%;
    transform: translate(-50%, -50%);
    left: 0;
    opacity: 0;
    transition: opacity 0.2s;
    box-shadow: 0 0 10px rgba(27,214,142,0.5);
}

.ultra-progress-container:hover .ultra-progress-handle {
    opacity: 1;
}

/* أزرار التحكم */
.ultra-controls-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-direction: row-reverse;
    color: white;
}

.ultra-controls-group {
    display: flex;
    align-items: center;
    gap: 20px;
    flex-direction: row-reverse;
}

.ultra-control-btn {
    background: none;
    border: none;
    color: white;
    font-size: 20px;
    cursor: pointer;
    width: 40px;
    height: 40px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
}

.ultra-control-btn:hover {
    background: rgba(255,255,255,0.1);
    color: #1bd68e;
}

.ultra-control-btn:active {
    transform: scale(0.9);
}

.ultra-control-btn.active {
    color: #1bd68e;
}

/* وقت التشغيل */
.ultra-time {
    font-size: 14px;
    font-weight: bold;
    color: white;
    margin: 0 5px;
    direction: ltr;
    font-family: monospace;
}

/* شريط الصوت */
.ultra-volume-container {
    position: relative;
    display: flex;
    align-items: center;
}

.ultra-volume-slider {
    width: 0;
    height: 5px;
    background: rgba(255,255,255,0.2);
    border-radius: 10px;
    margin-right: 10px;
    overflow: hidden;
    transition: width 0.2s;
}

.ultra-volume-container:hover .ultra-volume-slider {
    width: 80px;
}

.ultra-volume-fill {
    height: 100%;
    background: #1bd68e;
    width: 100%;
}

.ultra-volume-btn {
    width: 40px;
    height: 40px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
}

/* سرعة التشغيل */
.ultra-speed-menu {
    position: absolute;
    bottom: 50px;
    left: 0;
    background: rgba(20,20,20,0.95);
    backdrop-filter: blur(10px);
    border-radius: 12px;
    border: 1px solid rgba(255,255,255,0.1);
    padding: 8px;
    display: none;
    z-index: 30;
}

.ultra-speed-menu.show {
    display: block;
}

.ultra-speed-item {
    padding: 10px 20px;
    color: white;
    cursor: pointer;
    border-radius: 8px;
    text-align: center;
    font-size: 14px;
    transition: all 0.2s;
}

.ultra-speed-item:hover {
    background: rgba(27,214,142,0.2);
    color: #1bd68e;
}

.ultra-speed-item.active {
    background: #1bd68e;
    color: black;
    font-weight: bold;
}

/* شاشة القفل للتحكم بالريموت */
.ultra-focus-indicator {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    border: 3px solid #1bd68e;
    border-radius: 4px;
    pointer-events: none;
    z-index: 25;
    opacity: 0;
    transition: opacity 0.2s;
    box-shadow: 0 0 20px rgba(27,214,142,0.3);
}

.ultra-player-container.focused .ultra-focus-indicator {
    opacity: 1;
}

/* إشعارات سريعة (مثل تغيير الصوت) */
.ultra-notification {
    position: absolute;
    top: 20%;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(0,0,0,0.8);
    color: white;
    padding: 15px 30px;
    border-radius: 50px;
    border: 2px solid #1bd68e;
    font-size: 24px;
    font-weight: bold;
    z-index: 100;
    display: none;
    align-items: center;
    gap: 15px;
    backdrop-filter: blur(10px);
}

.ultra-notification.show {
    display: flex;
}

/* قائمة الجودة */
.ultra-quality-menu {
    position: absolute;
    bottom: 50px;
    right: 0;
    background: rgba(20,20,20,0.95);
    backdrop-filter: blur(10px);
    border-radius: 12px;
    border: 1px solid rgba(255,255,255,0.1);
    padding: 8px;
    display: none;
    z-index: 30;
    min-width: 150px;
}

.ultra-quality-menu.show {
    display: block;
}

.ultra-quality-item {
    padding: 10px 20px;
    color: white;
    cursor: pointer;
    border-radius: 8px;
    text-align: center;
    font-size: 14px;
    transition: all 0.2s;
}

.ultra-quality-item:hover {
    background: rgba(27,214,142,0.2);
    color: #1bd68e;
}

.ultra-quality-item.active {
    background: #1bd68e;
    color: black;
    font-weight: bold;
}

/* تكيف مع الجوال */
@media (max-width: 768px) {
    .ultra-big-play {
        width: 70px;
        height: 70px;
    }
    
    .ultra-big-play i {
        font-size: 30px;
    }
    
    .ultra-control-btn {
        width: 35px;
        height: 35px;
        font-size: 16px;
    }
    
    .ultra-volume-container:hover .ultra-volume-slider {
        width: 50px;
    }
}
    </style>
</head>

            <button onclick="Router.go('settings')" class="flex items-center gap-4 text-gray-400 hover:text-primary transition-colors text-right">
                <i class="fa-solid fa-gear w-6"></i>
                <span class="font-bold">الإعدادات</span>
            </button>
            <button onclick="Router.go('help')" class="flex items-center gap-4 text-gray-400 hover:text-primary transition-colors text-right">
                <i class="fa-regular fa-circle-question w-6"></i>
                <span class="font-bold">مساعدة</span>
            </button>
            <button class="flex items-center gap-4 text-red-500 hover:text-red-400 transition-colors text-right mt-10 pt-6 border-t border-white/5">
                <i class="fa-solid fa-arrow-right-from-bracket w-6"></i>
                <span class="font-bold">تسجيل الخروج</span>
            </button>
        </div>
    </div>
</div>

    <script>
        const API_BASE = '/api';
        const State = { view: 'home', params: {}, player: null };

        // 1. إدارة التوجيه (Router)
        const Router = {
            async go(view, params = {}) {
                State.view = view;
                State.params = params;
                window.scrollTo({ top: 0, behavior: 'smooth' });
                this.updateActiveNav();
                await this.render();
            },
            updateActiveNav() {
                document.querySelectorAll('.nav-link').forEach(el => {
                    el.classList.toggle('active', el.dataset.view === State.view);
                });
            },
            async render() {
                const root = document.getElementById('app-root');
                root.innerHTML = `<div class="h-screen flex items-center justify-center"><div class="w-12 h-12 border-4 border-primary border-t-transparent rounded-full animate-spin"></div></div>`;
                
                try {
                    let html = '';
                    switch (State.view) {
                        case 'home': html = await Views.home(); break;
                        case 'details': 
                            html = await Views.details(State.params.id); 
                            root.innerHTML = `<div class="page-fade">${html}</div>`;
                            Views.initSeasonMarker(); // هذا السطر هو المحرك الأساسي للظهور الافتراضي
                            break;
                        case 'actor': html = await Views.actor(State.params.id); break;
                        case 'player': html = await Views.player(State.params.id, State.params.type); break;
                        case 'search': html = Views.search(); break;
                        case 'movies': html = await Views.grid('movies'); break;
                        case 'series': html = await Views.grid('series'); break;
                    }
                    root.innerHTML = `<div class="page-fade">${html}</div>`;
                    if (State.view === 'player') PlayerEngine.init();
                } catch (e) {
                    console.error(e);
                    root.innerHTML = `<div class="h-screen flex flex-col items-center justify-center text-center px-6"><h2 class="text-2xl font-bold mb-4 text-red-500">حدث خطأ</h2><button onclick="Router.go('home')" class="bg-primary text-black px-8 py-3 rounded-xl font-bold">العودة للرئيسية</button></div>`;
                }
            }
        };

        // 2. المكونات (UI Components)
        const UI = {
            card(item) {
                if (!item) return '';
                const prog = localStorage.getItem(`prog_${item.id}`) || 0;
                return `
                    <div onclick="Router.go('details', {id: '${item.id}'})" class="group cursor-pointer">
                        <div class="relative aspect-[2/3] rounded-2xl overflow-hidden bg-surface border border-white/5 transition-all duration-500 card-glow group-hover:-translate-y-2">
                            <img src="${item.poster || '/uploads/posters/default.jpg'}" class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-110" loading="lazy">
                            <div class="absolute inset-0 bg-gradient-to-t from-black via-transparent opacity-0 group-hover:opacity-100 transition-opacity flex items-center justify-center">
                                <div class="w-12 h-12 bg-primary rounded-full flex items-center justify-center text-black shadow-xl scale-50 group-hover:scale-100 transition-all">
                                    <i class="fa-solid fa-play ml-1"></i>
                                </div>
                            </div>
                            <div class="absolute top-2 right-2 bg-black/60 backdrop-blur px-2 py-0.5 rounded text-[10px] font-black border border-white/10">
                                <i class="fa-solid fa-star text-yellow-500 mr-1"></i>${item.rating || '0.0'}
                            </div>
                            <div class="absolute top-2 left-2 bg-black/60 backdrop-blur px-2 py-0.5 rounded text-[10px] font-black border border-white/10">
                                <span>${item.tags}</span>
                            </div>
                            ${prog > 0 ? `<div class="thumb-progress"><div class="thumb-progress-fill" style="width: ${prog}%"></div></div>` : ''}
                        </div>
                        <h3 class="mt-3 text-xs md:text-sm font-bold truncate group-hover:text-primary transition-colors text-right px-1">${item.title}</h3>
                        <div class="flex justify-between items-center px-1 mt-1 text-[10px] text-gray-500 font-bold">
                            <span>${item.year}</span>
                            <span class="bg-white/5 px-1.5 rounded uppercase">${item.isMovie ? 'فيلم' : 'مسلسل'}</span>
                        </div>
                    </div>
                `;
            },
            back() {
                return `<button onclick="window.history.back()" class="fixed top-6 left-6 md:right-32 z-50 w-12 h-12 bg-surface/80 backdrop-blur rounded-2xl flex items-center justify-center text-white border border-white/10 hover:bg-primary transition-all shadow-2xl"><i class="fa-solid fa-arrow-right"></i></button>`;
            }
        };

        // 3. المشاهد (Views)
        const Views = {
            // تعريف المتغيرات لمنع الأخطاء
            currentSlide: 0,
            slideCount: 0,
            sliderInterval: null,
            startX: 0,
            isDragging: false,
            
            // --- الصفحة الرئيسية والسلايدر ---
            async home() {
                const res = await fetch(`${API_BASE}/home`);
                const data = await res.json();
                const promos = (data.promotions && data.promotions.length > 0) ? data.promotions : data.latestMovies.slice(0, 5);
                
                const renderSlide = (item, index) => `
                    <div class="slide min-w-full h-full relative overflow-hidden select-none">
                        <img src="${item.poster}" class="absolute inset-0 w-full h-full object-cover opacity-60 pointer-events-none">
                        <div class="absolute inset-0 hero-mask"></div>
                        <div class="absolute inset-0 side-mask hidden md:block"></div>
                        
                        <div class="absolute bottom-0 right-0 w-full p-8 md:p-24 z-10 text-right pb-32 md:pb-24">
                            <div class="flex items-center justify-end gap-3 mb-6">
                                <span class="bg-primary text-black px-4 py-1 rounded-full text-[11px] font-black uppercase tracking-widest shadow-lg shadow-primary/20">
                                    ${item.promoted ? 'فيلم مميز' : 'مسلسل حصري'}
                                </span>
                                <span class="bg-white/10 backdrop-blur px-4 py-1 rounded-full text-[11px] font-black">${item.year}</span>
                                <span class="bg-white/10 backdrop-blur px-4 py-1 rounded-full text-[11px] font-black border border-white/20">${item.countries || 'عالمي'}</span>
                            </div>
                            <h1 class="text-4xl md:text-8xl font-black mb-8 leading-tight max-w-5xl mr-0 ml-auto tracking-tighter drop-shadow-2xl">${item.title}</h1>
                            <p class="text-gray-400 max-w-2xl text-lg md:text-xl mb-10 line-clamp-2 leading-relaxed mr-0 ml-auto font-light">${item.description}</p>
                            
                            <div class="flex flex-row-reverse gap-4">
                                <button onclick="Router.go('details', {id: '${item.id}'})" class="bg-primary text-black px-12 py-5 rounded-2xl font-black text-lg hover:bg-white hover:scale-105 active:scale-95 transition-all shadow-xl shadow-primary/20 flex items-center gap-3">
                                    <i class="fa-solid fa-play"></i> شاهد الآن
                                </button>
                                <button class="bg-white/5 backdrop-blur text-white px-10 py-5 rounded-2xl font-black border border-white/10 hover:bg-white/10 transition-all"><i class="fa-solid fa-plus ml-2"></i> قائمتي</button>
                            </div>
                        </div>
                    </div>`;

                setTimeout(() => this.initHeroSlider(promos.length), 200);

                return `
                    <div class="space-y-16">
                        <section class="relative h-[85vh] md:h-[90vh] w-full overflow-hidden bg-black group">
                            <div id="hero-slider-container" class="h-full">
                                ${promos.map((p, i) => renderSlide(p, i)).join('')}
                            </div>

                            ${promos.length > 1 ? `
                            <div class="absolute bottom-10 left-0 w-full z-30 flex justify-center gap-2 flex-row-reverse">
                                ${promos.map((_, i) => `<div class="hero-dot w-2 h-2 rounded-full cursor-pointer" onclick="Views.jumpToSlide(${i})"></div>`).join('')}
                            </div>` : ''}
                        </section>

                        <div class="px-6 md:px-16 space-y-20 -mt-20 relative z-20 pb-20">
                            <section>
                                <div class="flex flex-row-reverse items-center justify-between mb-10 text-right">
                                    <h2 class="text-3xl font-black flex flex-row-reverse items-center gap-4">أحدث الأفلام <span class="w-1.5 h-8 bg-primary rounded-full shadow-[0_0_15px_#1bd68e]"></span></h2>
                                    <button onclick="Router.go('movies')" class="text-primary text-sm font-black hover:underline">عرض الكل</button>
                                </div>
                                <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-5 lg:grid-cols-7 gap-6">${(data.latestMovies || []).map(m => UI.card(m)).join('')}</div>
                            </section>
                            <section>
                                <div class="flex flex-row-reverse items-center justify-between mb-10 text-right">
                                    <h2 class="text-3xl font-black flex flex-row-reverse items-center gap-4">أحدث المسلسلات <span class="w-1.5 h-8 bg-primary rounded-full shadow-[0_0_15px_#1bd68e]"></span></h2>
                                    <button onclick="Router.go('series')" class="text-primary text-sm font-black hover:underline">عرض الكل</button>
                                </div>
                                <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-5 lg:grid-cols-7 gap-6">${(data.latestSeries || []).map(s => UI.card(s)).join('')}</div>
                            </section>
                        </div>
                    </div>`;
            },

            // --- دوال التحكم في السلايدر ودعم اللمس ---
            initHeroSlider(count) {
                if (count <= 1) return;
                this.slideCount = count;
                this.currentSlide = 0;
                const container = document.getElementById('hero-slider-container');
                if (!container) return;

                // دعم اللمس والسحب (Drag Logic)
                container.addEventListener('touchstart', (e) => {
                    this.isDragging = true;
                    this.startX = e.touches[0].clientX;
                    container.classList.add('dragging');
                    clearInterval(this.sliderInterval);
                }, {passive: true});

                container.addEventListener('touchmove', (e) => {
                    if (!this.isDragging) return;
                    const currentX = e.touches[0].clientX;
                    const diff = currentX - this.startX;
                    // معادلة الحركة: (الشريحة الحالية * 100) + (إزاحة الإصبع كنسبة مئوية)
                    const move = (this.currentSlide * 100) - (diff / window.innerWidth * 100);
                    container.style.transform = `translateX(${move}%)`;
                }, {passive: true});

                container.addEventListener('touchend', (e) => {
                    this.isDragging = false;
                    container.classList.remove('dragging');
                    const endX = e.changedTouches[0].clientX;
                    const diff = this.startX - endX;

                    // إذا كانت السحبة قوية (أكثر من 15% من الشاشة)
                    if (Math.abs(diff) > window.innerWidth * 0.15) {
                        if (diff > 0) this.currentSlide = (this.currentSlide + 1) % this.slideCount;
                        else this.currentSlide = (this.currentSlide - 1 + this.slideCount) % this.slideCount;
                    }
                    this.moveSlider(this.currentSlide);
                    this.startAutoPlay();
                });

                this.startAutoPlay();
                this.updateDots(0);
            },

            startAutoPlay() {
                if (this.sliderInterval) clearInterval(this.sliderInterval);
                this.sliderInterval = setInterval(() => {
                    this.currentSlide = (this.currentSlide + 1) % this.slideCount;
                    this.moveSlider(this.currentSlide);
                }, 7000); // كل 7 ثواني
            },

            moveSlider(index) {
                const container = document.getElementById('hero-slider-container');
                if (container) {
                    container.style.transform = `translateX(${index * 100}%)`;
                    this.updateDots(index);
                }
            },

            jumpToSlide(index) {
                this.currentSlide = index;
                this.moveSlider(index);
                this.startAutoPlay();
            },

            updateDots(index) {
                const dots = document.querySelectorAll('.hero-dot');
                dots.forEach((dot, i) => {
                    dot.classList.toggle('active', i === index);
                });
            },

            async details(id) {
                const [item, cast] = await Promise.all([
                    fetch(`${API_BASE}/series/${id}`).then(r => r.json()),
                    fetch(`${API_BASE}/content/${id}/actors`).then(r => r.json())
                ]);

                // تحديد أول حلقة للتشغيل (سواء بمواسم أو بدون)
                const firstId = !item.isMovie && item.seasons?.length > 0 
                    ? (item.episodes?.find(e => e.seasonId === item.seasons[0].id)?.id || '') 
                    : (item.isMovie ? item.id : (item.episodes?.[0]?.id || ''));

                const progress = Math.round(localStorage.getItem(`prog_${firstId}`) || 0);
                const buttonText = progress > 0 && progress < 95 ? 'أكمل المشاهدة' : 'شاهد الآن';

                // حل مشكلة عرض حلقات الموسم الأول تلقائياً
                let initialEpisodesHtml = '';
                if (!item.isMovie) {
                    if (item.seasons?.length > 0) {
                        // حالة وجود مواسم: جلب حلقات الموسم الأول
                        const firstSznId = item.seasons[0].id;
                        initialEpisodesHtml = (item.episodes || [])
                            .filter(e => e.seasonId === firstSznId)
                            .map(ep => Views.episodeRow(ep)).join('');
                    } else if (item.episodes?.length > 0) {
                        // حالة مسلسل بدون مواسم: عرض الحلقات مباشرة
                        initialEpisodesHtml = item.episodes.map(ep => Views.episodeRow(ep)).join('');
                    }
                }

                setTimeout(() => {
                    const stickyHeader = document.getElementById('smart-sticky-header');
                    const tabSection = document.getElementById('sticky-tab-bar');
                    const originalNav = document.getElementById('seasons-nav-original');
                    
                    window.onscroll = () => {
                        const navPos = originalNav ? originalNav.getBoundingClientRect().top : 0;
                        if (window.scrollY > 400) {
                            stickyHeader.style.transform = 'translateY(0)';
                            stickyHeader.style.opacity = '1';
                            if (navPos < 20 && item.seasons?.length > 0) {
                                stickyHeader.classList.add('h-36');
                                tabSection.classList.replace('hidden', 'flex');
                            } else {
                                stickyHeader.classList.remove('h-36');
                                tabSection.classList.replace('flex', 'hidden');
                            }
                        } else {
                            stickyHeader.style.transform = 'translateY(-100%)';
                            stickyHeader.style.opacity = '0';
                        }
                    };
                    if(item.seasons?.length > 0) Views.initSeasonMarker();
                }, 200);

                return `
                    <div class="min-h-screen relative pb-20">
                        
                        <div id="smart-sticky-header" class="fixed top-0 inset-x-0 z-[150] h-20 bg-obsidian-80 backdrop-blur-3xl border-b border-white/5 flex flex-col transition-all duration-500 translate-y-[-100%] opacity-0">
                            <div class="flex-1 flex items-center justify-between px-6 flex-row-reverse">
                                <div class="smart flex items-center gap-4 flex-row-reverse pr-20 md:pr-0">
                                    <img src="${item.poster}" class="w-10 h-14 object-cover rounded shadow-lg border border-white/10">
                                    <div class="text-right">
                                        <h2 class="text-white font-black text-sm truncate max-w-[150px]">${item.title}</h2>
                                        <div class="flex flex-row-reverse items-center gap-2">
                                            <span class="text-primary text-[10px] font-black italic">★ ${item.rating}</span>
                                            <span class="text-gray-500 text-[10px] font-bold">${item.year}</span>
                                        </div>
                                    </div>
                                </div>
                                <button onclick="Router.go('player', {id: '${firstId}', type: '${item.isMovie ? 'movie' : 'episode'}'})" 
                                    class="bg-primary text-black px-6 py-2 rounded-xl font-black text-[11px] shadow-lg active:scale-95 transition-transform">تشغيل</button>
                            </div>
                            <div id="sticky-tab-bar" class="hidden h-8 border-t border-white/5 flex flex-row-reverse items-center gap-2 px-4 overflow-x-auto no-scrollbar">
                                ${item.seasons?.map((s, idx) => `
                                    <button onclick="Views.switchSeason('${s.id}', '${item.id}', this, true)" 
                                        class="season-tab-item shrink-0 px-8 h-full flex flex-col items-center justify-center transition-all ${idx === 0 ? 'text-primary active-tab font-black' : 'text-gray-500'}"
                                        data-id="${s.id}">
                                        <span class="text-[11px]">${s.title}</span>
                                        <div class="tab-line w-0 h-[3px] bg-primary rounded-full transition-all"></div>
                                    </button>
                                `).join('') || ''}
                            </div>
                        </div>

                        <div class="relative h-[75vh] md:h-[85vh] w-full flex items-end overflow-hidden">
                            <div class="absolute inset-0">
                                <img src="${item.poster}" class="w-full h-full object-cover object-top opacity-40 blur-[2px] scale-110">
                                <img src="${item.poster}" class="w-full h-full object-cover object-top md:object-right-top absolute inset-0 z-10" style="mask-image: linear-gradient(to top, black 20%, transparent 90%), linear-gradient(to right, black 30%, transparent 90%); -webkit-mask-image: linear-gradient(to top, black 20%, transparent 90%), linear-gradient(to left, black 30%, transparent 90%);">
                                <div class="absolute inset-0 bg-gradient-to-t from-obsidian via-obsidian/60 to-transparent z-20"></div>
                            </div>
                            
                            <div class="fixed top-6 right-6 z-[160]">${UI.back()}</div>

                            <div class="relative z-30 w-full max-w-7xl mx-auto px-6 pb-16 text-center md:text-right flex flex-col items-center md:items-end">
                                
                                <div class="flex flex-row-reverse gap-3 mb-8 items-center justify-center md:justify-start flex-wrap">
                                    <span class="px-3 py-1 bg-primary text-black text-[10px] font-black rounded-md shadow-[0_0_15px_#1bd68e55]">${item.isMovie ? 'فيلم' : 'مسلسل'}</span>
                                    <span class="px-3 py-1 bg-white/10 text-white border border-white/10 text-[10px] font-black rounded-md">${item.year}</span>
                                    <span class="px-3 py-1 bg-white/10 text-primary border border-white/10 text-[10px] font-black rounded-md italic">★ ${item.rating}</span>
                                    ${(item.genres || []).map(g => `<span class="text-gray-400 text-[10px] font-bold border-r border-white/10 pr-3 last:border-0">${g}</span>`).join('')}
                                </div>

                                <h1 class="text-5xl md:text-9xl font-black mb-12 text-white drop-shadow-[0_10px_30px_rgba(0,0,0,0.5)] leading-none">${item.title}</h1>
                                
                                <div class="flex flex-col md:flex-row-reverse items-center gap-6 w-full md:w-auto">
                                    <button onclick="Router.go('player', {id: '${firstId}', type: '${item.isMovie ? 'movie' : 'episode'}'})" 
                                        class="w-full md:w-auto min-w-[240px] relative overflow-hidden bg-primary text-black px-16 py-5 rounded-3xl font-black text-2xl hover:scale-105 transition-all shadow-[0_20px_40px_rgba(27,214,142,0.2)] flex items-center justify-center gap-4 group">
                                        <i class="fa-solid fa-play group-hover:scale-125 transition-transform"></i>
                                        <span>${buttonText}</span>
                                        ${progress > 0 ? `<div class="absolute bottom-0 left-0 h-1.5 bg-black/20 w-full"><div class="h-full bg-white shadow-[0_0_10px_white]" style="width: ${progress}%"></div></div>` : ''}
                                    </button>

                                    <div class="flex gap-4">
                                        <button class="w-16 h-16 rounded-2xl bg-white/5 backdrop-blur-2xl border border-white/10 flex items-center justify-center text-white hover:bg-white hover:text-black transition-all group">
                                            <i class="fa-regular fa-heart text-2xl group-hover:scale-110"></i>
                                        </button>
                                        <button class="w-16 h-16 rounded-2xl bg-white/5 backdrop-blur-2xl border border-white/10 flex items-center justify-center text-white hover:bg-white hover:text-black transition-all group">
                                            <i class="fa-regular fa-bookmark text-2xl group-hover:scale-110"></i>
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div class="max-w-7xl mx-auto px-6 mt-16 relative z-30">
                            <div class="flex flex-col lg:flex-row-reverse gap-16">
                                
                                <div class="lg:w-72 shrink-0">
                                    <div class="sticky top-28 bg-white/[0.02] p-6 rounded-[2.5rem] border border-white/5 text-right hidden lg:block">
                                        <img src="${item.poster}" class="w-full aspect-[2/3] object-cover rounded-[1.5rem] shadow-2xl mb-8">
                                        <div class="space-y-6">
                                            <div><span class="text-gray-500 font-bold text-[10px] block mb-1 uppercase tracking-widest">التقييم العالمي</span><span class="text-primary font-black text-2xl">★ ${item.rating}</span></div>
                                            <div><span class="text-gray-500 font-bold text-[10px] block mb-1 uppercase tracking-widest">تاريخ العرض</span><span class="text-white font-black text-lg">${item.year}</span></div>
                                        </div>
                                    </div>
                                </div>

                                <div class="flex-1 text-right">
                                    <div class="mb-16">
                                        <h3 class="text-xl font-black text-white mb-6 border-r-4 border-primary pr-4">القصة</h3>
                                        <p class="text-gray-400 text-lg md:text-2xl leading-relaxed italic opacity-80">${item.description || 'لا يوجد وصف.'}</p>
                                    </div>

                                    <div class="mb-20">
                                        <h3 class="text-lg font-black text-white mb-8 pr-4 border-r-4 border-white/10">طاقم العمل</h3>
                                        <div class="flex flex-row-reverse gap-6 overflow-x-auto no-scrollbar pb-4">
                                            ${(cast || []).map(a => `
                                                <div onclick="Router.go('actor', {id: '${a.actorId}'})" class="flex flex-col items-center min-w-[100px] group cursor-pointer">
                                                    <div class="w-20 h-20 rounded-full p-[3px] border-2 border-primary/20 group-hover:border-primary transition-all duration-500 mb-4 overflow-hidden shadow-2xl">
                                                        <img src="${a.actorImage || a.image || '/uploads/actors/default.jpg'}" class="w-full h-full object-cover rounded-full group-hover:scale-110">
                                                    </div>
                                                    <div class="text-white font-black text-[11px] truncate w-24 text-center">${a.characterName || 'شخصية'}</div>
                                                    <div class="text-gray-500 text-[9px] font-bold truncate w-24 text-center opacity-60 italic">${a.actorName || a.name}</div>
                                                </div>
                                            `).join('')}
                                        </div>
                                    </div>

                                    ${!item.isMovie ? `
                                        <div class="space-y-12">
                                            <div id="seasons-nav-original" class="flex flex-col md:flex-row-reverse md:items-center justify-between gap-8 pb-6 border-b border-white/5">
                                                <h3 class="text-2xl font-black text-white italic">قائمة الحلقات</h3>
                                                ${item.seasons?.length > 0 ? `
                                                <div class="seasons-wrapper !w-fit px-1.5 py-1.5 bg-white/5 rounded-full border border-white/5 relative" id="seasons-nav">

const PlayerEngine = {
    player: null, // تخزين مرجع المشغل
    
    init() {
        const vidId = document.querySelector('[data-vid]').dataset.vid;
        const videoElement = document.getElementById('ultra-v');
        
        // ✅ إذا كان المشغل موجوداً بالفعل، دمره قبل إنشاء جديد
        if (this.player) {
            try {
                this.player.dispose();
                this.player = null;
            } catch (e) {
                console.log(' disposing old player');
            }
        }
        
        // ✅ إنشاء مشغل جديد
        this.player = videojs('ultra-v', {
            fluid: true,
            playbackRates: [0.5, 1, 1.25, 1.5, 2],
            controlBar: { 
                skipButtons: { forward: 10, backward: 10 },
                pictureInPictureToggle: true // تفعيل زر صورة داخل صورة
            },
            // ✅ إعدادات إضافية لتحسين الأداء
            html5: {
                vhs: {
                    overrideNative: true,
                    fastQualityChange: true
                },
                nativeAudioTracks: false,
                nativeVideoTracks: false
            }
        });

        // ✅ زيادة عداد المشاهدات عند التشغيل
        this.player.one('play', () => {
            fetch(`${API_BASE}/watch/${vidId}`)
                .then(r => r.json())
                .catch(err => console.error("View count error"));
        });

        // ✅ استعادة وقت المشاهدة
        const saved = localStorage.getItem(`time_${vidId}`);
        if (saved) {
            this.player.ready(() => {
                this.player.currentTime(parseFloat(saved));
            });
        }

        // ✅ حفظ التقدم
        this.player.on('timeupdate', () => {
            const curr = this.player.currentTime();
            const duration = this.player.duration();
            if (curr > 5 && duration) {
                localStorage.setItem(`time_${vidId}`, curr);
                const perc = (curr / duration) * 100;
                localStorage.setItem(`prog_${vidId}`, perc);
            }
        });

        // ✅ عند الانتهاء من التشغيل
        this.player.on('ended', () => {
            this.showEndCard(vidId);
        });

        // ✅ ميزة الضغط المطول لتسريع الفيديو 2x
        this.setupLongPressSpeed();

        // ✅ اقتراحات أسفل المشغل
        this.loadSuggestions();
    },

    setupLongPressSpeed() {
        const el = document.querySelector('.video-js');
        if (!el) return;
        
        const tag = document.getElementById('speed-tag');
        let timer;
        
        const start2x = () => { 
            timer = setTimeout(() => { 
                if (this.player) {
                    this.player.playbackRate(2); 
                    if (tag) tag.style.display = 'block';
                }
            }, 400); 
        };
        
        const stop2x = () => { 
            clearTimeout(timer); 
            if (this.player) {
                this.player.playbackRate(1); 
                if (tag) tag.style.display = 'none';
            }
        };

        el.addEventListener('mousedown', start2x);
        el.addEventListener('mouseup', stop2x);
        el.addEventListener('mouseleave', stop2x);
        
        el.addEventListener('touchstart', (e) => { 
            if(e.touches.length === 1) start2x(); 
        }, {passive: true});
        el.addEventListener('touchend', stop2x);
        el.addEventListener('touchcancel', stop2x);
    },

                            ` : `
                            <p class="text-gray-400 mb-8">لقد انتهيت من جميع الحلقات</p>
                            <button onclick="Router.go('details', {id: '${seriesId}'})" 
                                class="bg-primary text-black px-8 py-4 rounded-2xl font-black">
                                العودة لصفحة المسلسل
                            </button>
                            `}
                        </div>
                    `;
                    
                    document.getElementById('p-container').appendChild(endCard);
                    
                    // بدء العد التنازلي إذا وجدت حلقة تالية
                    if (nextEp) {
                        let count = 5;
                        const countdownEl = document.getElementById('countdown');
                        const timer = setInterval(() => {
                            count--;
                            if (countdownEl) countdownEl.textContent = count;
                            
                            if (count <= 0) {
                                clearInterval(timer);
                                Router.go('player', {id: nextEp.id, type: 'episode'});
                            }
                        }, 1000);
                    }
                });
        }
    },

    loadSuggestions() {
        fetch(`${API_BASE}/home`)
            .then(r => r.json())
            .then(d => {
                const sugEl = document.getElementById('player-sug');
                if(sugEl) {
                    const items = d.latestMovies?.slice(0, 6) || [];
                    sugEl.innerHTML = items.map(m => `
                        <div onclick="Router.go('details', {id: '${m.id}'})" class="cursor-pointer group">
                            <div class="aspect-[2/3] rounded-xl overflow-hidden">
                                <img src="${m.poster}" class="w-full h-full object-cover group-hover:scale-110 transition-transform">
                            </div>
                            <h4 class="text-xs font-bold mt-2 text-center truncate">${m.title}</h4>
                        </div>
                    `).join('');
                }
            });
    },

    togglePictureInPicture() {
        const video = document.querySelector('video');
        if (document.pictureInPictureEnabled) {
            if (document.pictureInPictureElement) {
                document.exitPictureInPicture();
            } else if (video) {
                video.requestPictureInPicture();
            }
        }
    },
    
    like() {
        const vidId = document.querySelector('[data-vid]').dataset.vid;
        fetch(`${API_BASE}/like/${vidId}`, { method: 'POST' })
            .then(() => {
                const btn = event.currentTarget;
                btn.innerHTML = '<i class="fa-solid fa-thumbs-up text-primary text-xl"></i>';
            });
    },
    
    share() {
        if (navigator.share) {
            navigator.share({
                title: document.title,
                url: window.location.href
            });
        } else {
            navigator.clipboard.writeText(window.location.href);
            alert('تم نسخ الرابط');
        }
    },
    
    addToWatchlist() {
        const vidId = document.querySelector('[data-vid]').dataset.vid;
        fetch(`${API_BASE}/watchlist/add`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ contentId: vidId })
        }).then(() => {
            const btn = event.currentTarget;
            btn.innerHTML = '<i class="fa-solid fa-bookmark text-primary text-xl"></i>';
        });
    }
};


let lastScrollTop = 0;
const mobileNav = document.getElementById('mobile-nav');

window.addEventListener('scroll', () => {
    if (window.innerWidth < 768) {
        let scrollTop = window.scrollY || document.documentElement.scrollTop;
        if (scrollTop > lastScrollTop && scrollTop > 100) {
            // التمرير لأسفل - اخفاء
            mobileNav.style.transform = 'translateY(100%)';
        } else {
            // التمرير لأعلى - اظهار
            mobileNav.style.transform = 'translateY(0)';
        }
        lastScrollTop = scrollTop;
    }
});




        window.onload = () => Router.go('home');
    </script>
</body>
