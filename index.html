<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
        content="MediaNet Ultra - ميديا نت ألترا: منصة مشاهدة الأفلام والمسلسلات الحصرية بجودة عالية وتصميم عصري.">
    <title>MediaNet Ultra | ميديا نت ألترا</title>
    <base href="/">


    <script src="/script.js"></script>

    <link rel="stylesheet" href="/fontawesome/fontawesome/css/all.min.css">

    <link href="/css/font.css" rel="stylesheet">

    <link href="/css/collection.css" rel="stylesheet">
    <link href="/videojs/video-js.css" rel="stylesheet" />
    <script src="/videojs/video.min.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#1bd68e',
                        accent: '#ff0f1a',
                        obsidian: '#050608',
                        surface: '#11131a',
                        card: '#1a1d26'
                    },
                    fontFamily: { sans: ['Readex Pro', 'sans-serif'] }
                }
            }
        }
    </script>

    <style>
        :root {
            --p: #1bd68e;
            --bg: #050608;
        }

        body {
            background-color: var(--bg);
            color: #fff;
            -webkit-tap-highlight-color: transparent;
            scroll-behavior: smooth;
            overflow-x: hidden;
            font-family: 'Readex Pro', sans-serif;
        }

        .container-custom {
            max-width: 1440px;
            margin-left: auto;
            margin-right: auto;
        }

        /* ضمان عدم دخول أي عنصر تحت الشريط الجانبي */
        @media (min-width: 768px) {
            #app-root {
                margin-right: 0;
                max-width: calc(100vw - 96px);
                overflow-x: hidden;
            }


        }

        .glass {
            background: rgba(17, 19, 26, 0.6);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-top: 1px solid rgba(255, 255, 255, 0.05);
        }

        .sidebar-glass {
            background: rgba(11, 13, 20, 0.8);
            backdrop-filter: blur(25px);
            border-left: 1px solid rgba(255, 255, 255, 0.05);
        }

        .video-js.vjs-theme-ultra {
            font-family: 'Readex Pro', sans-serif;
            color: #fff;
            border-radius: 0;
        }

        .vjs-theme-ultra .vjs-big-play-button {
            background: rgba(27, 214, 142, 0.9) !important;
            border: none !important;
            border-radius: 50% !important;
            width: 80px !important;
            height: 80px !important;
            line-height: 80px !important;
            top: 50% !important;
            left: 50% !important;
            margin-top: -40px !important;
            margin-left: -40px !important;
            box-shadow: 0 0 40px rgba(27, 214, 142, 0.4);
            display: none !important;
            /* We will use custom center buttons */
        }

        .vjs-theme-ultra .vjs-play-progress {
            background-color: #1bd68e !important;
        }

        .vjs-theme-ultra .vjs-play-progress:before {
            color: #1bd68e !important;
        }

        .vjs-theme-ultra .vjs-load-progress {
            background: rgba(255, 255, 255, 0.2) !important;
        }

        .vjs-theme-ultra .vjs-slider {
            background-color: rgba(255, 255, 255, 0.1) !important;
        }

        .vjs-theme-ultra .vjs-control-bar {
            background: linear-gradient(0deg, rgba(0, 0, 0, 0.9) 0%, rgba(0, 0, 0, 0.5) 50%, transparent 100%) !important;
            height: 100px !important;
            align-items: flex-end !important;
            padding-bottom: 10px !important;
        }

        /* Netflix Center Controls */
        .netflix-center-controls {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            display: flex;
            align-items: center;
            gap: 40px;
            z-index: 100;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .ultra-player-container:hover .netflix-center-controls,
        .ultra-player-container.vjs-paused .netflix-center-controls {
            opacity: 1;
            pointer-events: all;
        }

        .netflix-center-controls.locked {
            display: none !important;
        }

        .center-btn {
            width: 70px;
            height: 70px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, 0.5);
            border-radius: 50%;
            color: white;
            font-size: 30px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .center-btn:hover {
            background: rgba(27, 214, 142, 0.8);
            transform: scale(1.1);
        }

        .center-btn.play-large {
            width: 90px;
            height: 90px;
            font-size: 40px;
        }

        /* Lock Button */
        .player-lock-btn {
            position: absolute;
            top: 50%;
            left: 20px;
            transform: translateY(-50%);
            z-index: 110;
            width: 50px;
            height: 50px;
            background: rgba(0, 0, 0, 0.5);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            cursor: pointer;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .ultra-player-container:hover .player-lock-btn {
            opacity: 1;
        }

        .player-lock-btn.active {
            color: #1bd68e;
            opacity: 1;
            background: rgba(0, 0, 0, 0.8);
        }

        .player-top-bar.locked {
            display: none !important;
        }

        /* Custom Bottom Bar */
        .player-bottom-bar {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(0deg, rgba(0, 0, 0, 0.95) 0%, rgba(0, 0, 0, 0.6) 50%, transparent 100%);
            padding: 20px 30px 30px 30px;
            z-index: 100;
            opacity: 0;
            transition: opacity 0.3s, transform 0.3s;
            transform: translateY(10px);
            pointer-events: none;
        }

        .ultra-player-container:hover .player-bottom-bar,
        .ultra-player-container.vjs-paused .player-bottom-bar {
            opacity: 1;
            transform: translateY(0);
            pointer-events: all;
        }

        .player-bottom-bar.locked {
            display: none !important;
        }

        /* Custom Progress Bar */
        .custom-progress-container {
            width: 100%;
            height: 6px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            cursor: pointer;
            position: relative;
            margin-bottom: 20px;
            transition: height 0.2s;
        }

        .custom-progress-container:hover {
            height: 10px;
        }

        .custom-progress-bar {
            position: absolute;
            left: 0;
            top: 0;
            height: 100%;
            background: var(--p);
            border-radius: 10px;
            width: 0%;
            transition: width 0.1s linear;
            box-shadow: 0 0 15px var(--p);
        }

        .custom-progress-handle {
            position: absolute;
            right: -8px;
            top: 50%;
            transform: translateY(-50%) scale(0);
            width: 16px;
            height: 16px;
            background: white;
            border-radius: 50%;
            transition: transform 0.2s;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.5);
        }

        .custom-progress-container:hover .custom-progress-handle {
            transform: translateY(-50%) scale(1);
        }

        /* Custom Control Buttons */
        .bottom-ctrl-btn {
            width: 45px;
            height: 45px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 20px;
            border-radius: 12px;
            transition: all 0.2s;
            cursor: pointer;
            position: relative;
        }

        .bottom-ctrl-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            color: var(--p);
            transform: translateY(-3px);
        }

        .bottom-ctrl-btn:active {
            scale: 0.9;
        }

        /* Volume Slider */
        .volume-container {
            display: flex;
            align-items: center;
            gap: 10px;
            width: 45px;
            overflow: hidden;
            transition: width 0.3s;
        }

        .volume-container:hover {
            width: 150px;
        }

        .volume-slider {
            width: 100px;
            height: 4px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            cursor: pointer;
            position: relative;
        }

        .volume-fill {
            height: 100%;
            background: var(--p);
            border-radius: 10px;
            width: 100%;
        }

        /* Mobile Tap Regions */
        .tap-region {
            position: absolute;
            top: 0;
            bottom: 100px;
            width: 30%;
            z-index: 50;
        }

        .tap-left {
            left: 0;
        }

        .tap-right {
            right: 0;
        }

        /* Custom Animations */
        .page-fade {
            animation: pageFade 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        @keyframes pageFade {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .scrollbar-hide::-webkit-scrollbar {
            display: none;
        }

        .card-glow:hover {
            box-shadow: 0 0 20px rgba(27, 214, 142, 0.2);
            border-color: rgba(27, 214, 142, 0.4);
        }

        /* Speed Overlay */
        .speed-overlay {
            position: absolute;
            top: 25%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.8);
            color: #1bd68e;
            padding: 12px 24px;
            border-radius: 50px;
            font-weight: 800;
            border: 1px solid #1bd68e;
            z-index: 100;
            pointer-events: none;
            display: none;
            box-shadow: 0 0 20px rgba(27, 214, 142, 0.3);
        }

        /* --- Hero Slider Styles (Updated) --- */
        #hero-slider-container {
            display: flex;
            transition: transform 0.6s cubic-bezier(0.23, 1, 0.32, 1);
            will-change: transform;
            height: 100%;
            touch-action: pan-y;
            /* يسمح بالسحب العمودي ويمنع تداخل الأفقي */
        }

        /* حالة السحب: تعطيل الانميشن لتتبع الإصبع */
        #hero-slider-container.dragging {
            transition: none !important;
        }

        .hero-mask {
            background: linear-gradient(to top, #050608 0%, rgba(5, 6, 8, 0.8) 40%, transparent 100%);
        }

        .side-mask {
            background: linear-gradient(to left, #050608 0%, rgba(5, 6, 8, 0.4) 50%, transparent 100%);
        }

        .slide {
            transition: opacity 0.5s ease;
        }

        /* تنسيق النقاط */
        .hero-dot {
            transition: all 0.4s ease;
            background-color: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .hero-dot.active {
            background-color: var(--p) !important;
            width: 2.5rem !important;
            border-color: var(--p) !important;
        }

        .slide-in-rtl {
            animation: slideInRTL 0.4s ease-out forwards;
        }

        @keyframes slideInRTL {
            from {
                opacity: 0;
                transform: translateX(30px);

            }

            to {
                opacity: 1;
                transform: translateX(0);
            }
        }


        .seasons-wrapper {
            position: relative;
            display: inline-flex;
            flex-direction: row-reverse;
            background: rgba(255, 255, 255, 0.05);
            padding: 0;
            /* إزالة المسافة الداخلية ليبدو متصل */
            border-radius: 30px;
            /* زاوية أكبر للرمادي */
            border: 1px solid rgba(255, 255, 255, 0.1);
            gap: 0;
            /* إزالة الفجوة بين الأزرار */
            z-index: 1;
        }

        .season-indicator {
            position: absolute;
            top: 0;
            /* تعديل ليغطي بالكامل */
            bottom: 0;
            background: var(--p);
            border-radius: 0;
            /* إزالة الزاوية ليكون مربع */
            transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
            z-index: 0;
            box-shadow: 0 4px 15px rgba(27, 214, 142, 0.3);
            opacity: 1 !important;
        }

        .season-btn {
            position: relative;
            z-index: 1;
            padding: 8px 20px 8px 8px;
            /* الحفاظ على التوازن */
            font-weight: 900;
            font-size: 0.875rem;
            transition: all 0.3s;
            border-radius: 0;
            /* إزالة الزاوية ليبدو متصل */
        }

        .active-season {
            color: black !important;
        }





        /* تصميم التاب بار في الهيدر للجوال */
        .active-tab {
            color: #1bd68e !important;
        }

        .active-tab .tab-line {
            width: 100% !important;
            opacity: 1;
        }

        /* نقاط الممثلين الذكية */
        .actor-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.2);
            transition: all 0.3s ease;
        }

        .actor-dot.active {
            background: #1bd68e;
            width: 18px;
            border-radius: 10px;
        }

        /* تحسين التمرير */
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }

        /* ===== مشغل UltraTV - تصميم متكامل ===== */
        .ultra-player-container {
            position: relative;
            width: 100%;
            background: black;
            direction: ltr;
        }

        /* جعل الفيديو يظهر في منتصف الخلفية السوداء */
        .ultra-player-container video {
            object-fit: contain !important;
            object-position: center !important;
            background: black;
        }

        .ultra-player-container .video-js {
            background-color: black !important;
        }

        .ultra-player-container .vjs-tech {
            object-fit: contain !important;
            object-position: center !important;
        }

        /* شاشة البداية (Poster) */
        .ultra-poster {
            position: absolute;
            inset: 0;
            background-size: cover;
            background-position: center;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10;
            transition: opacity 0.3s;
        }

        .ultra-poster.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .ultra-big-play {
            width: 90px;
            height: 90px;
            background: rgba(27, 214, 142, 0.9);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 0 30px rgba(27, 214, 142, 0.5);
        }

        .ultra-big-play i {
            font-size: 40px;
            color: black;
            margin-left: 5px;
            /* تعويض لوسط الزر */
        }

        .ultra-big-play:hover {
            transform: scale(1.1);
            background: #fff;
        }

        .ultra-big-play:hover i {
            color: #1bd68e;
        }

        /* شريط التحكم الرئيسي */
        .ultra-controls {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(transparent, rgba(0, 0, 0, 0.9));
            padding: 20px 20px 15px;
            z-index: 20;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
        }

        .ultra-player-container.show-controls .ultra-controls,
        .ultra-player-container:hover .ultra-controls {
            opacity: 1;
            pointer-events: all;
        }

        /* شريط التقدم */
        .ultra-progress-container {
            width: 100%;
            margin-bottom: 15px;
            cursor: pointer;
            position: relative;
            height: 5px;
        }

        .ultra-progress-bg {
            width: 100%;
            height: 5px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            position: relative;
            overflow: hidden;
        }

        .ultra-progress-fill {
            height: 100%;
            background: #1bd68e;
            border-radius: 10px;
            position: relative;
            width: 0%;
            transition: width 0.1s linear;
        }

        .ultra-progress-buffered {
            position: absolute;
            top: 0;
            left: 0;
            height: 100%;
            background: rgba(255, 255, 255, 0.4);
            border-radius: 10px;
            width: 0%;
        }

        .ultra-progress-handle {
            width: 13px;
            height: 13px;
            background: #1bd68e;
            border-radius: 50%;
            position: absolute;
            top: 50%;
            transform: translate(-50%, -50%);
            left: 0;
            opacity: 0;
            transition: opacity 0.2s;
            box-shadow: 0 0 10px rgba(27, 214, 142, 0.5);
        }

        .ultra-progress-container:hover .ultra-progress-handle {
            opacity: 1;
        }

        /* أزرار التحكم */
        .ultra-controls-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-direction: row-reverse;
            color: white;
        }

        .ultra-controls-group {
            display: flex;
            align-items: center;
            gap: 20px;
            flex-direction: row-reverse;
        }

        .ultra-control-btn {
            background: none;
            border: none;
            color: white;
            font-size: 20px;
            cursor: pointer;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .ultra-control-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            color: #1bd68e;
        }

        .ultra-control-btn:active {
            transform: scale(0.9);
        }

        .ultra-control-btn.active {
            color: #1bd68e;
        }

        /* وقت التشغيل */
        .ultra-time {
            font-size: 14px;
            font-weight: bold;
            color: white;
            margin: 0 5px;
            direction: ltr;
            font-family: monospace;
        }

        /* شريط الصوت */
        .ultra-volume-container {
            position: relative;
            display: flex;
            align-items: center;
        }

        .ultra-volume-slider {
            width: 0;
            height: 5px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            margin-right: 10px;
            overflow: hidden;
            transition: width 0.2s;
        }

        .ultra-volume-container:hover .ultra-volume-slider {
            width: 80px;
        }

        .ultra-volume-fill {
            height: 100%;
            background: #1bd68e;
            width: 100%;
        }

        .ultra-volume-btn {
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        /* سرعة التشغيل */
        .ultra-speed-menu {
            position: absolute;
            bottom: 50px;
            left: 0;
            background: rgba(20, 20, 20, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 8px;
            display: none;
            z-index: 30;
        }

        .ultra-speed-menu.show {
            display: block;
        }

        .ultra-speed-item {
            padding: 10px 20px;
            color: white;
            cursor: pointer;
            border-radius: 8px;
            text-align: center;
            font-size: 14px;
            transition: all 0.2s;
        }

        .ultra-speed-item:hover {
            background: rgba(27, 214, 142, 0.2);
            color: #1bd68e;
        }

        .ultra-speed-item.active {
            background: #1bd68e;
            color: black;
            font-weight: bold;
        }

        /* شاشة القفل للتحكم بالريموت */
        .ultra-focus-indicator {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            border: 3px solid #1bd68e;
            border-radius: 4px;
            pointer-events: none;
            z-index: 25;
            opacity: 0;
            transition: opacity 0.2s;
            box-shadow: 0 0 20px rgba(27, 214, 142, 0.3);
        }

        .ultra-player-container.focused .ultra-focus-indicator {
            opacity: 1;
        }

        /* إشعارات سريعة (مثل تغيير الصوت) */
        .ultra-notification {
            position: absolute;
            top: 20%;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.8);
            color: white;
            padding: 15px 30px;
            border-radius: 50px;
            border: 2px solid #1bd68e;
            font-size: 24px;
            font-weight: bold;
            z-index: 100;
            display: none;
            align-items: center;
            gap: 15px;
            backdrop-filter: blur(10px);
        }

        .ultra-notification.show {
            display: flex;
        }

        /* قائمة الجودة */
        .ultra-quality-menu {
            position: absolute;
            bottom: 50px;
            right: 0;
            background: rgba(20, 20, 20, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 8px;
            display: none;
            z-index: 30;
            min-width: 150px;
        }

        .ultra-quality-menu.show {
            display: block;
        }

        .ultra-quality-item {
            padding: 10px 20px;
            color: white;
            cursor: pointer;
            border-radius: 8px;
            text-align: center;
            font-size: 14px;
            transition: all 0.2s;
        }

        .ultra-quality-item:hover {
            background: rgba(27, 214, 142, 0.2);
            color: #1bd68e;
        }

        .ultra-quality-item.active {
            background: #1bd68e;
            color: black;
            font-weight: bold;
        }

        /* تكيف مع الجوال */
        @media (max-width: 768px) {
            .ultra-big-play {
                width: 70px;
                height: 70px;
            }

            .ultra-big-play i {
                font-size: 30px;
            }

            .ultra-control-btn {
                width: 35px;
                height: 35px;
                font-size: 16px;
            }

            .ultra-volume-container:hover .ultra-volume-slider {
                width: 50px;
            }
        }

        /* تحسين الترجمة */
        .vjs-text-track-display {
            bottom: 120px !important;
            font-size: 24px !important;
            font-family: 'Readex Pro', sans-serif !important;
            text-shadow: 2px 2px 10px rgba(0, 0, 0, 1) !important;
        }

        @media (max-width: 768px) {
            .vjs-text-track-display {
                font-size: 18px !important;
                bottom: 100px !important;
            }
        }

        /* قائمة الجودة والترجمة */
        .custom-menu {
            position: absolute;
            bottom: 85px;
            right: 30px;
            background: rgba(11, 13, 20, 0.95);

        }

        @keyframes menuShow {
            from {
                opacity: 0;

                opacity: 1;
                transform: translateY(0) scale(1);
            }

                opacity: 1;

        /* مؤشر وقت التشغيل */

            font-weight: bold !important;

        /* زر صورة داخل صورة */
        .vjs-picture-in-picture-control {
            display: inline-block !important;

        /* مؤشر سرعة التشغيل */
        .speed-indicator {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);

            color: #1bd68e;

        @keyframes speedPulse {
            0% {
                opacity: 0;
                transform: translate(-50%, -50%) scale(0.8);
            }

            50% {
                opacity: 1;
                transform: translate(-50%, -50%) scale(1.1);

        /* Custom Scrollbar */

        .no-scrollbar::-webkit-scrollbar {

        /* إضافة position: relative لجميع النقاط لدعم ::after */
        .hero-dot {
            position: relative;

        /* تعديل النقطة النشطة: خلفية شفافة قليلاً */
        .hero-dot.active {
            background-color: rgba(27, 214, 142, 0.3) !important;

        /* شريط التقدم باستخدام ::after */

            content: '';
            position: absolute;
            left: 0;
            top: 0;
            height: 100%;
            width: 0%;
            /* يبدأ من 0% */

            /* اللون الأخضر */

        /* الـ keyframes للحركة */

            to {

                /* يصل إلى 100% */

        .hero-dot {
            position: relative;

            /* لضمان عدم خروج الشريط عن حدود النقطة */

    <script>
        // ==================== دوال تسجيل الدخول عبر البروفايل (عالمية) ====================
        window.showPasswordPrompt = function(userId, displayName) {
            console.log('[DEBUG] Opening password prompt for:', displayName, userId);
            const prompt = document.getElementById('password-prompt');
            const nameEl = document.getElementById('password-prompt-name');
            const userIdInput = document.getElementById('profile-user-id');
            const passwordInput = document.getElementById('profile-password');
            const errorDiv = document.getElementById('profile-login-error');
            
            if (!prompt) {
                console.error('[ERROR] Password prompt element not found!');
                return;
            }

            nameEl.textContent = displayName;
            userIdInput.value = userId;
            errorDiv.classList.add('hidden');
            passwordInput.value = '';
            prompt.classList.remove('hidden');
            
            prompt.scrollIntoView({ behavior: 'smooth', block: 'center' });
            setTimeout(() => passwordInput.focus(), 300);
        };

        window.handleProfileLogin = async function(e) {
            e.preventDefault();
            console.log('[DEBUG] Handling profile login submission');
            const userId = document.getElementById('profile-user-id').value;
            const password = document.getElementById('profile-password').value;
            const errorDiv = document.getElementById('profile-login-error');

            if (!password) {
                errorDiv.textContent = 'يرجى إدخال كلمة المرور';
                errorDiv.classList.remove('hidden');
                return;
            }

            try {
                const userRes = await fetch(`/api/profiles/select`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ userId })
                });
                const userData = await userRes.json();
                
                if (!userData.success) {
                    errorDiv.textContent = 'المستخدم غير موجود';
                    errorDiv.classList.remove('hidden');
                    return;
                }

                const loginRes = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: userData.user.username, password })
                });
                const loginData = await loginRes.json();

                if (loginData.success) {
                    const sessionData = {
                        userId: loginData.user.id,
                        username: loginData.user.username,
                        name: userData.user.name || loginData.user.username,
                        avatar: userData.user.avatar,
                        age: userData.user.age,
                        profileId: loginData.user.id
                    };
                    localStorage.setItem('session', JSON.stringify(sessionData));
                    window.location.reload(); 
                } else {
                    errorDiv.textContent = loginData.error || 'كلمة المرور غير صحيحة';
                    errorDiv.classList.remove('hidden');
                }
            } catch (err) {
                console.error('[ERROR] Profile login failed:', err);
                errorDiv.textContent = 'حدث خطأ في الاتصال';
                errorDiv.classList.remove('hidden');
            }
        };

        const API_BASE = '/api';
        let currentSession = null;

        async function handleLogin(e) {
            e.preventDefault();
            const username = document.getElementById('login-username').value;
            const password = document.getElementById('login-password').value;
            const errDiv = document.getElementById('login-error');

            try {
                const res = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                const data = await res.json();

                if (data.success) {
                    saveSession({
                        userId: data.user.id,
                        username: data.user.username,
                        name: data.user.name,
                        age: data.user.age,
                        profileId: data.user.id
                    });
                    document.getElementById('login-modal').style.display = 'none';
                    Router.go('home');
                } else {
                    errDiv.innerText = data.error || 'فشل تسجيل الدخول';
                    errDiv.classList.remove('hidden');
                }
            } catch (err) {
                errDiv.innerText = 'حدث خطأ في الاتصال';
                errDiv.classList.remove('hidden');
            }
        }

        // Global check on load
        window.addEventListener('DOMContentLoaded', () => {
            if (!loadSession()) {
                Router.go('profileSelection', {}, false);
            } else {
                Router.resolve();
            }
        });

        window.onpopstate = (e) => {
            if (e.state) {
                Router.go(e.state.view, e.state.params, false);
            } else {
                Router.resolve();
            }
        };

        // Intercept API fetch calls to add userId and profileId
        const originalFetch = window.fetch;
        window.fetch = function () {
            let [resource, config] = arguments;
            const isApi = typeof resource === 'string' && resource.startsWith(API_BASE);
            const isAuth = typeof resource === 'string' && resource.includes('/auth/');
            
            if (isApi && !isAuth && currentSession && currentSession.userId) {
                const separator = resource.includes('?') ? '&' : '?';
                let query = 'userId=' + currentSession.userId;
                if (currentSession.profileId) {
                    query += '&profileId=' + currentSession.profileId;
                }
                resource += separator + query;
            }
            return originalFetch(resource, config);
        };

        // Watch History Logic
        async function logWatchHistory(contentId, contentType, progress) {
            if (!currentSession || !currentSession.userId) return;
            try {
                await fetch('/api/history', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        userId: currentSession.userId,
                        contentId: contentId,
                        contentType: contentType,
                        progress: progress
                    })
                });
            } catch (err) {
                console.error('Failed to log history', err);
            }
        }

        const State = { view: 'home', params: {}, player: null };

        // currentSession declared at the top of script

        function saveSession(session) {
            currentSession = session;
            localStorage.setItem('session', JSON.stringify(session));
        }

        function clearSession() {
            currentSession = null;
            localStorage.removeItem('session');
        }


        function loadSession() {
            const saved = localStorage.getItem('session');
            if (saved) {
                try {
                    currentSession = JSON.parse(saved);
                    if (currentSession && currentSession.userId) {
                        return true;
                    }
                } catch (e) { }
            }
            currentSession = null;
            return false;
        }

        function showAlert(message, type = 'success') {
            const alertDiv = document.createElement('div');
            alertDiv.className = `fixed top-20 left-1/2 transform -translate-x-1/2 z-50 px-6 py-3 rounded-xl font-bold shadow-lg transition-all duration-300 ${type === 'success' ? 'bg-green-500 text-white' : 'bg-red-500 text-white'}`;
            alertDiv.innerHTML = message;
            document.body.appendChild(alertDiv);
            setTimeout(() => alertDiv.remove(), 3000);
        }

        function logout() {
            clearSession();
            Router.go('profileSelection');
        }


        // 1. إدارة التوجيه (Router)
        const Router = {
            async go(view, params = {}, push = true) {
                // منع الدخول لأي صفحة إذا لم يكن هناك جلسة
                if (!currentSession && view !== 'profileSelection') {
                    view = 'profileSelection';
                    params = {};
                }

                State.view = view;
                State.params = params;

                if (push) {
                    let path = '/';
                    if (view === 'movies') path = '/movies';
                    else if (view === 'series') path = '/series';
                    else if (view === 'search') path = '/search';
                    else if (view === 'details') path = `/details/${params.id}`;
                    else if (view === 'collection') path = `/collection/${params.id}`;
                    else if (view === 'actor') path = `/actor/${params.id}`;
                    else if (view === 'player') path = `/player/${params.id}/${params.type}`;
                    else if (view === 'account') path = '/account';
                    
                    history.pushState({ view, params }, '', path);
                }

                window.scrollTo({ top: 0, behavior: 'smooth' });
                this.updateActiveNav();
                await this.render();
            },

            async resolve() {
                const path = window.location.pathname;
                let view = 'home';
                let params = {};

                if (path === '/movies') view = 'movies';
                else if (path === '/series') view = 'series';
                else if (path === '/search') view = 'search';
                else if (path === '/account') view = 'account';
                else if (path.startsWith('/details/')) {
                    view = 'details';
                    params.id = path.split('/')[2];
                }
                else if (path.startsWith('/collection/')) {
                    view = 'collection';
                    params.id = path.split('/')[2];
                }
                else if (path.startsWith('/actor/')) {
                    view = 'actor';
                    params.id = path.split('/')[2];
                }
                else if (path.startsWith('/player/')) {
                    view = 'player';

            // --- دوال التحكم في السلايدر ودعم اللمس ---
            initHeroSlider(count) {
                if (count <= 1) return;
                this.slideCount = count;
                this.currentSlide = 0;
                const container = document.getElementById('hero-slider-container');
                if (!container) return;

                // دعم اللمس والسحب (Drag Logic)
                container.addEventListener('touchstart', (e) => {
                    this.isDragging = true;
                    this.startX = e.touches[0].clientX;
                    container.classList.add('dragging');
                    clearInterval(this.sliderInterval);
                }, { passive: true });

                container.addEventListener('touchmove', (e) => {
                    if (!this.isDragging) return;
                    const currentX = e.touches[0].clientX;
                    const diff = currentX - this.startX;
                    // معادلة الحركة: (الشريحة الحالية * 100) + (إزاحة الإصبع كنسبة مئوية)
                    const move = (this.currentSlide * 100) - (diff / window.innerWidth * 100);
                    container.style.transform = `translateX(${move}%)`;
                }, { passive: true });

                container.addEventListener('touchend', (e) => {
                    this.isDragging = false;
                    container.classList.remove('dragging');
                    const endX = e.changedTouches[0].clientX;
                    const diff = this.startX - endX;

                    // إذا كانت السحبة قوية (أكثر من 15% من الشاشة)
                    if (Math.abs(diff) > window.innerWidth * 0.15) {
                        if (diff > 0) this.currentSlide = (this.currentSlide + 1) % this.slideCount;
                        else this.currentSlide = (this.currentSlide - 1 + this.slideCount) % this.slideCount;
                    }
                    this.moveSlider(this.currentSlide);
                    this.startAutoPlay();
                });

                this.startAutoPlay();
                this.updateDots(0);
            },

            initCollectionSlideshow() {
                const cards = document.querySelectorAll('.collection-card');
                cards.forEach(card => {
                    const posters = JSON.parse(card.dataset.posters || '[]');
                    if (posters.length <= 1) return;

                    const imgs = card.querySelectorAll('.slideshow-img');
                    let currentIdx = 0;
                    let interval = null;

                    card.addEventListener('mouseenter', () => {
                        interval = setInterval(() => {
                            const nextIdx = (currentIdx + 1) % posters.length;
                            
                            imgs[1].src = posters[nextIdx];
                            imgs[1].classList.remove('opacity-0');
                            imgs[0].classList.add('opacity-0');

                            setTimeout(() => {
                                imgs[0].src = posters[nextIdx];
                                imgs[0].classList.remove('opacity-0');
                                imgs[1].classList.add('opacity-0');
                                currentIdx = nextIdx;
                            }, 700);
                        }, 2500);
                    });

                    card.addEventListener('mouseleave', () => {
                        if (interval) clearInterval(interval);
                        imgs[0].src = posters[0];
                        imgs[0].classList.remove('opacity-0');
                        imgs[1].classList.add('opacity-0');
                        currentIdx = 0;
                    });
                });
            },

            startAutoPlay() {
                if (this.sliderInterval) clearInterval(this.sliderInterval);
                this.sliderInterval = setInterval(() => {
                    this.currentSlide = (this.currentSlide + 1) % this.slideCount;
                    this.moveSlider(this.currentSlide);
                }, 7000); // كل 7 ثواني
            },

            moveSlider(index) {
                const container = document.getElementById('hero-slider-container');
                if (container) {
                    container.style.transform = `translateX(${index * 100}%)`;
                    this.updateDots(index);
                }
            },

            jumpToSlide(index) {
                this.currentSlide = index;
                this.moveSlider(index);
                this.startAutoPlay();

            updateDots(index) {
                const dots = document.querySelectorAll('.hero-dot');

                dots.forEach((dot) => {
                    dot.classList.remove('active');
                    // سطر سحري لإعادة تشغيل الأنميشن: يطلب من المتصفح حساب الأبعاد مجدداً

            async profileSelection() {

                        + '<input type="hidden" id="profile-user-id">'

        };


        // ==========================================
        // 4. محرك المشغل المتطور (Netflix Experience)
        // ==========================================
        const PlayerEngine = {
            player: null,

            currentSubtitle: null,
            currentQuality: 'auto',
            keyboardShortcuts: {
                'space': 'playPause',
                'ArrowRight': 'skipForward',
                'ArrowLeft': 'skipBackward',
                'ArrowUp': 'volumeUp',
                'ArrowDown': 'volumeDown',
                'f': 'fullscreen',
                'm': 'mute',
                'p': 'pictureInPicture',
                '>': 'speedUp',
                '<': 'speedDown',
                '0': 'restart',
                'c': 'toggleSubtitles'
            },

            init() {
                const vidId = document.querySelector('[data-vid]')?.dataset.vid;
                if (!vidId) return;

                // ✅ إعدادات متقدمة للمشغل
                this.setupPlayer(vidId);
                this.loadSubtitles(vidId);
                this.setupKeyboardControls();
                this.setupGestures();
                this.loadSuggestions();
            },

            setupPlayer(vidId) {
                const videoElement = document.getElementById('ultra-v');
                if (!videoElement) return;

                // تدمير المشغل القديم إن وجد
                if (this.player) {
                    try { this.player.dispose(); } catch (e) { }
                }

                // ✅ إنشاء مشغل بمواصفات نيتفليكس
                this.player = videojs('ultra-v', {
                    fluid: true,
                    controls: false,
                    autoplay: true,
                    preload: 'auto',
                    playbackRates: [0.5, 0.75, 1, 1.25, 1.5, 1.75, 2],
                    html5: {
                        vhs: {
                            overrideNative: true,
                            fastQualityChange: true,
                            useBandwidthFromLocalStorage: true
                        },
                        nativeAudioTracks: false,
                        nativeVideoTracks: false
                    },
                    userActions: {
                        hotkeys: true,
                        doubleClick: false
                    }
                });

                // ✅ تحديث الواجهة المخصصة
                this.setupCustomUI(vidId);

                // ✅ زيادة عداد المشاهدات
                this.player.one('play', () => {
                    fetch(`${API_BASE}/watch/${vidId}`).catch(() => { });
                });

                // ✅ حفظ واستعادة التقدم
                const savedTime = localStorage.getItem(`time_${vidId}`);
                if (savedTime) this.player.currentTime(parseFloat(savedTime));

                this.player.on('timeupdate', () => {
                    const currentTime = this.player.currentTime();
                    const duration = this.player.duration();
                    if (currentTime > 5 && duration) {
                        localStorage.setItem(`time_${vidId}`, currentTime);
                        localStorage.setItem(`prog_${vidId}`, (currentTime / duration) * 100);
                    }
                    this.updateCustomProgress();
                });

                // تحديث أيقونات التشغيل
                const updateIcons = () => {
                    const isPaused = this.player.paused();
                    document.getElementById('center-play-icon').className = isPaused ? 'fa-solid fa-play ml-2' : 'fa-solid fa-pause';
                    document.getElementById('bottom-play-icon').className = isPaused ? 'fa-solid fa-play' : 'fa-solid fa-pause';
                };
                this.player.on('play', updateIcons);
                this.player.on('pause', updateIcons);
                this.player.on('ended', () => this.showNextEpisodePrompt(vidId));
            },

            setupCustomUI(vidId) {
                const progressContainer = document.getElementById('custom-progress-container');

                // النقر على شريط التقدم للتقديم
                progressContainer.onclick = (e) => {
                    const rect = progressContainer.getBoundingClientRect();
                    const pos = (e.clientX - rect.left) / rect.width;
                    this.player.currentTime(pos * this.player.duration());
                };

                // التحكم بالصوت
                const volSlider = document.getElementById('volume-slider');
                volSlider.onclick = (e) => {
                    const rect = volSlider.getBoundingClientRect();
                    const vol = (e.clientX - rect.left) / rect.width;
                    this.player.volume(Math.max(0, Math.min(1, vol)));
                    this.updateVolumeUI();
                };
            },

            updateCustomProgress() {
                if (!this.player) return;
                const curr = this.player.currentTime();
                const total = this.player.duration();
                const progress = total ? (curr / total) * 100 : 0;

                document.getElementById('custom-progress-bar').style.width = `${progress}%`;
                document.getElementById('curr-time').textContent = this.formatTime(curr);
                document.getElementById('total-time').textContent = this.formatTime(total);
            },

            updateVolumeUI() {
                const vol = this.player.volume();
                const muted = this.player.muted();
                document.getElementById('volume-fill').style.width = `${muted ? 0 : vol * 100}%`;
                document.getElementById('volume-icon').className = (muted || vol === 0) ? 'fa-solid fa-volume-xmark' : (vol < 0.5 ? 'fa-solid fa-volume-low' : 'fa-solid fa-volume-high');
            },

            formatTime(seconds) {
                if (isNaN(seconds)) return "00:00";
                const h = Math.floor(seconds / 3600);
                const m = Math.floor((seconds % 3600) / 60);
                const s = Math.floor(seconds % 60);
                if (h > 0) return `${h}:${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
                return `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
            },

            // ✅ تحميل الترجمات المتاحة
            async loadSubtitles(vidId) {
                try {
                    const vidData = document.querySelector('[data-vid]');
                    const seriesId = vidData?.dataset.series;

                    // جلب بيانات المحتوى
                    const response = await fetch(`${API_BASE}/series/${seriesId || vidId}`);
                    const content = await response.json();

                    // البحث عن ملفات الترجمة
                    const subtitleUrls = [];

                    if (content.subtitleUrl) {
                        subtitleUrls.push({
                            label: 'العربية',
                            srclang: 'ar',
                            src: content.subtitleUrl,
                            default: true
                        });
                    }

                    // إضافة ترجمات الحلقات إذا وجدت
                    if (content.episodes) {
                        const episode = content.episodes.find(ep => ep.id === vidId);
                        if (episode?.subtitleUrl && !subtitleUrls.some(s => s.src === episode.subtitleUrl)) {
                            subtitleUrls.push({
                                label: 'العربية',
                                srclang: 'ar',
                                src: episode.subtitleUrl
                            });
                        }
                    }

                    // إضافة الترجمات إلى المشغل
                    if (subtitleUrls.length > 0 && this.player) {
                        const trackElement = document.createElement('track');
                        trackElement.kind = 'subtitles';
                        trackElement.label = subtitleUrls[0].label;
                        trackElement.srclang = subtitleUrls[0].srclang;
                        trackElement.src = subtitleUrls[0].src;
                        trackElement.default = true;

                        const videoEl = document.getElementById('ultra-v');
                        videoEl.appendChild(trackElement);

                        this.player.ready(() => {
                            this.player.addRemoteTextTrack({
                                kind: 'subtitles',
                                label: subtitleUrls[0].label,
                                language: subtitleUrls[0].srclang,
                                src: subtitleUrls[0].src,
                                default: true
                            }, true);
                        });
                    }
                } catch (error) {
                    console.error('Error loading subtitles:', error);
                }
            },

            showQualityMenu() {
                const qualities = [
                    { label: 'تلقائي', value: 'auto' },
                    { label: '4K Ultra HD', value: '2160' },
                    { label: '1080p Full HD', value: '1080' },
                    { label: '720p HD', value: '720' },
                    { label: '480p SD', value: '480' }
                ];

                const existing = document.querySelector('.custom-menu');
                if (existing) { existing.remove(); return; }

                const menu = document.createElement('div');
                menu.className = 'custom-menu';

                menu.innerHTML = `
            <div class="px-4 py-2 text-gray-500 text-[10px] uppercase font-black tracking-widest border-b border-white/5 mb-2">جودة الفيديو</div>
            ${qualities.map(q => `
                <div class="menu-item ${this.currentQuality === q.value ? 'active' : ''}" onclick="PlayerEngine.setQuality('${q.value}')">
                    <span>${q.label}</span>
                    ${this.currentQuality === q.value ? '<i class="fa-solid fa-check"></i>' : ''}
                </div>
            `).join('')}
        `;

                document.getElementById('p-container').appendChild(menu);
            },

            setQuality(val) {
                this.currentQuality = val;
                this.showNotification(`🎬 جودة: ${val === 'auto' ? 'تلقائي' : val + 'p'}`);
                document.querySelector('.custom-menu')?.remove();
            },

            // ✅ التحكم بلوحة المفاتيح (مثل نيتفليكس)
            setupKeyboardControls() {
                document.addEventListener('keydown', (e) => {
                    // تجاهل إذا كان في حقل إدخال
                    if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;

                    const key = e.key;
                    const action = this.keyboardShortcuts[key === ' ' ? 'space' : key];

                    if (action && this.player) {
                        e.preventDefault();
                        this[action]();
                    }
                });
            },

            toggleLock(btn) {
                const isLocked = btn.classList.toggle('active');
                const container = document.getElementById('p-container');
                const topBar = container.querySelector('.player-top-bar');
                const bottomBar = container.querySelector('.player-bottom-bar');
                const centerCtrls = container.querySelector('.netflix-center-controls');

                if (isLocked) {
                    btn.innerHTML = '<i class="fa-solid fa-lock"></i>';
                    topBar.classList.add('locked');
                    bottomBar.classList.add('locked');
                    centerCtrls.classList.add('locked');
                    this.showNotification('🔒 تم قفل الشاشة');
                } else {
                    btn.innerHTML = '<i class="fa-solid fa-lock-open"></i>';
                    topBar.classList.remove('locked');
                    bottomBar.classList.remove('locked');
                    centerCtrls.classList.remove('locked');
                    this.showNotification('🔓 تم فتح الشاشة');
                }
            },

            playPause() {
                if (this.player.paused()) {
                    this.player.play();
                } else {
                    this.player.pause();
                }
            },

            skipForward() {
                const currentTime = this.player.currentTime();
                this.player.currentTime(currentTime + 10);
                this.showNotification('⏩ +10 ثواني');
            },

            skipBackward() {
                const currentTime = this.player.currentTime();
                this.player.currentTime(currentTime - 10);
                this.showNotification('⏪ -10 ثواني');
            },

            volumeUp() {
                let volume = this.player.volume();
                volume = Math.min(volume + 0.1, 1);
                this.player.volume(volume);
                this.updateVolumeUI();
                this.showNotification(`🔊 ${Math.round(volume * 100)}%`);
            },

            volumeDown() {
                let volume = this.player.volume();
                volume = Math.max(volume - 0.1, 0);
                this.player.volume(volume);
                this.updateVolumeUI();
                this.showNotification(`🔉 ${Math.round(volume * 100)}%`);
            },

            fullscreen() {
                const container = document.getElementById('p-container');
                const icon = document.getElementById('full-icon');
                const videoElement = document.querySelector('#ultra-v');

                if (!document.fullscreenElement) {
                    // طلب ملء الشاشة للعنصر
                    if (container.requestFullscreen) {
                        container.requestFullscreen();
                    } else if (container.webkitRequestFullscreen) {
                        container.webkitRequestFullscreen();
                    } else if (container.msRequestFullscreen) {
                        container.msRequestFullscreen();
                    }
                    icon.className = 'fa-solid fa-compress';

                    // تطبيق التوسيط بعد دخول الملء الشاشة
                    setTimeout(() => {
                        container.style.display = 'flex';
                        container.style.alignItems = 'center';
                        container.style.justifyContent = 'center';
                        container.style.background = 'black';

                        if (videoElement) {
                            videoElement.style.objectFit = 'contain';
                            videoElement.style.objectPosition = 'center';
                        }
                    }, 100);
                } else {
                    // الخروج من ملء الشاشة
                    if (document.exitFullscreen) {
                        document.exitFullscreen();
                    } else if (document.webkitExitFullscreen) {
                        document.webkitExitFullscreen();
                    } else if (document.msExitFullscreen) {
                        document.msExitFullscreen();
                    }
                    icon.className = 'fa-solid fa-expand';

                    // إعادة الوضع الطبيعي
                    setTimeout(() => {
                        container.style.display = '';
                        container.style.alignItems = '';
                        container.style.justifyContent = '';
                    }, 100);
                }
            },

            mute() {
                this.player.muted(!this.player.muted());
                this.updateVolumeUI();
                this.showNotification(this.player.muted() ? '🔇 كتم الصوت' : '🔊 تشغيل الصوت');
            },

            pictureInPicture() {
                const video = document.querySelector('video');
                if (document.pictureInPictureEnabled) {
                    if (document.pictureInPictureElement) {
                        document.exitPictureInPicture();
                        this.showNotification('🖼️ إلغاء صورة داخل صورة');
                    } else if (video) {
                        video.requestPictureInPicture();
                        this.showNotification('🖼️ وضع صورة داخل صورة');
                    }
                }
            },

            speedUp() {
                let rate = this.player.playbackRate();
                rate = Math.min(rate + 0.25, 2);
                this.player.playbackRate(rate);
                this.showNotification(`⚡ سرعة ${rate}x`);
            },

            speedDown() {
                let rate = this.player.playbackRate();
                rate = Math.max(rate - 0.25, 0.5);
                this.player.playbackRate(rate);
                this.showNotification(`🐢 سرعة ${rate}x`);
            },

            restart() {
                this.player.currentTime(0);
                this.player.play();
                this.showNotification('🔄 إعادة التشغيل');
            },

            toggleSubtitles() {
                if (!this.player) return;

                const tracks = this.player.textTracks();
                if (!tracks || tracks.length === 0) return;

                let anyVisible = false;
                for (let i = 0; i < tracks.length; i++) {
                    if (tracks[i].mode === 'showing') {
                        tracks[i].mode = 'hidden';
                        anyVisible = true;
                    } else if (tracks[i].mode === 'hidden') {
                        tracks[i].mode = 'showing';
                        anyVisible = true;
                        break;
                    }
                }

                this.showNotification(anyVisible ? '📝 إظهار الترجمة' : '🚫 إخفاء الترجمة');
            },

            // ✅ إشعارات سريعة
            showNotification(text) {
                const notification = document.createElement('div');
                notification.className = 'player-notification';
                notification.style.cssText = `
            position: absolute;
            top: 20%;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.8);
            color: #1bd68e;
            padding: 12px 24px;
            border-radius: 50px;
            font-weight: bold;
            z-index: 1000;
            border: 2px solid #1bd68e;
            backdrop-filter: blur(10px);
            animation: notificationFade 2s ease forwards;
        `;
                notification.textContent = text;

                const style = document.createElement('style');
                style.textContent = `
            @keyframes notificationFade {
                0% { opacity: 0; transform: translate(-50%, -20px); }
                10% { opacity: 1; transform: translate(-50%, 0); }
                90% { opacity: 1; transform: translate(-50%, 0); }
                100% { opacity: 0; transform: translate(-50%, -20px); }
            }
        `;
                document.head.appendChild(style);

                document.getElementById('p-container').appendChild(notification);
                setTimeout(() => notification.remove(), 2000);
            },

            // ✅ دعم الإيماءات (سحب للتحكم)
            setupGestures() {
                const container = document.getElementById('p-container');
                if (!container) return;

                let touchStartX = 0;
                let touchStartY = 0;

                container.addEventListener('touchstart', (e) => {
                    touchStartX = e.touches[0].clientX;
                    touchStartY = e.touches[0].clientY;
                });

                container.addEventListener('touchend', (e) => {
                    const touchEndX = e.changedTouches[0].clientX;
                    const touchEndY = e.changedTouches[0].clientY;

                    const deltaX = touchEndX - touchStartX;
                    const deltaY = touchEndY - touchStartY;

                    // سحب أفقي للتنقل
                    if (Math.abs(deltaX) > Math.abs(deltaY) && Math.abs(deltaX) > 50) {
                        if (deltaX < 0) { // سحب لليسار (تقدم)
                            this.skipForward();
                        } else { // سحب لليمين (رجوع)
                            this.skipBackward();
                        }
                    }

                    // سحب عمودي للتحكم بالصوت
                    if (Math.abs(deltaY) > Math.abs(deltaX) && Math.abs(deltaY) > 50) {
                        if (deltaY < 0) { // سحب لأعلى
                            this.volumeUp();
                        } else { // سحب لأسفل
                            this.volumeDown();
                        }
                    }
                });
            },

            // ✅ عرض الحلقة التالية
            showNextEpisodePrompt(vidId) {
                const vidData = document.querySelector('[data-vid]');
                const seriesId = vidData?.dataset.series;
                const seasonId = vidData?.dataset.season;
                const currentEp = parseInt(vidData?.dataset.episode || '0');

                if (seriesId && seasonId && currentEp) {
                    fetch(`${API_BASE}/episodes?seriesId=${seriesId}&seasonId=${seasonId}`)
                        .then(r => r.json())
                        .then(eps => {
                            const nextEp = eps.find(e => e.episodeNumber === currentEp + 1);

                            if (nextEp) {
                                const card = document.createElement('div');
                                card.className = 'next-episode-card';
                                card.style.cssText = `
                            position: absolute;
                            bottom: 100px;
                            right: 30px;
                            background: rgba(0,0,0,0.9);
                            backdrop-filter: blur(20px);
                            border: 2px solid #1bd68e;
                            border-radius: 16px;
                            padding: 20px;
                            width: 350px;
                            z-index: 100;
                            animation: slideInLeft 0.5s ease;
                        `;

                                card.innerHTML = `
                            <div class="flex items-center gap-4 mb-4">
                                <i class="fa-solid fa-forward-step text-primary text-2xl"></i>
                                <span class="text-white font-black">التالي</span>
                            </div>
                            <div class="flex gap-4 mb-4">
                                <img src="${nextEp.thumbnail || nextEp.poster}" 
                                     class="w-24 h-16 object-cover rounded-lg">
                                <div class="flex-1">
                                    <div class="text-primary text-sm font-black">حلقة ${nextEp.episodeNumber}</div>
                                    <div class="text-white font-bold">${nextEp.title || 'الحلقة التالية'}</div>
                                </div>
                            </div>
                            <div class="flex gap-3">
                                <button onclick="Router.go('player', {id: '${nextEp.id}', type: 'episode'})" 
                                    class="flex-1 bg-primary text-black py-3 rounded-xl font-black hover:bg-white transition-all">
                                    تشغيل
                                </button>
                                <button onclick="this.closest('.next-episode-card').remove()" 
                                    class="flex-1 bg-white/10 text-white py-3 rounded-xl font-black hover:bg-white/20 transition-all">
                                    إلغاء
                                </button>
                            </div>
                            <div class="text-center text-gray-500 text-sm mt-3">
                                سيتم التشغيل بعد <span id="next-countdown">10</span> ثواني
                            </div>
                        `;

                                document.getElementById('p-container').appendChild(card);

                                // عد تنازلي
                                let count = 10;
                                const timer = setInterval(() => {
                                    count--;
                                    const countEl = document.getElementById('next-countdown');
                                    if (countEl) countEl.textContent = count;

                                    if (count <= 0) {
                                        clearInterval(timer);
                                        Router.go('player', { id: nextEp.id, type: 'episode' });
                                    }
                                }, 1000);

                                // إلغاء العد إذا تم إغلاق الكارد
                                const closeBtn = card.querySelector('button:last-child');
                                closeBtn.onclick = () => {
                                    clearInterval(timer);
                                    card.remove();
                                };
                            }
                        });
                }
            },

            like() {
                const vidId = document.querySelector('[data-vid]').dataset.vid;
                fetch(`${API_BASE}/like/${vidId}`, { method: 'POST' })
                    .then(() => {
                        const btn = event.currentTarget;
                        btn.innerHTML = '<i class="fa-solid fa-thumbs-up text-primary text-xl"></i>';
                        this.showNotification('👍 شكراً على تقييمك');
                    });
            },

            share() {
                if (navigator.share) {
                    navigator.share({
                        title: document.title,
                        url: window.location.href
                    }).then(() => {
                        this.showNotification('✅ تم المشاركة');
                    });
                } else {
                    navigator.clipboard.writeText(window.location.href);
                    this.showNotification('📋 تم نسخ الرابط');
                }
            },

            addToWatchlist() {
                const vidId = document.querySelector('[data-vid]').dataset.vid;
                fetch(`${API_BASE}/watchlist/add`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contentId: vidId })
                }).then(() => {
                    const btn = event.currentTarget;
                    btn.innerHTML = '<i class="fa-solid fa-bookmark text-primary text-xl"></i>';
                    this.showNotification('✅ تمت الإضافة إلى قائمتي');
                });
            },

            loadSuggestions() {
                fetch(`${API_BASE}/home`)
                    .then(r => r.json())
                    .then(data => {
                        const sugEl = document.getElementById('player-sug');
                        if (sugEl) {
                            const items = data.latestMovies?.slice(0, 6) || [];
                            sugEl.innerHTML = items.map(m => `
                        <div onclick="Router.go('details', {id: '${m.id}'})" 
                             class="cursor-pointer group transform transition-all hover:scale-105">
                             <div class="aspect-[2/3] rounded-xl overflow-hidden shadow-lg">
                                 <img src="${m.poster}" class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-500">
                             </div>
                             <h4 class="text-xs font-bold mt-2 text-center truncate group-hover:text-primary">${m.title}</h4>
                             <p class="text-[10px] text-gray-500 text-center">${m.year}</p>
                         </div>
                     `).join('');
                        }
                    });
            },
        };

        let lastScrollTop = 0;
        const mobileNav = document.getElementById('mobile-nav');

        // إخفاء الشريط في البداية إذا كان هناك scroll
        if (window.innerWidth < 768 && window.scrollY > 0) {
            mobileNav.style.transform = 'translateY(100%)';
        }

        window.addEventListener('scroll', () => {
            if (window.innerWidth < 768) {
                let scrollTop = window.scrollY || document.documentElement.scrollTop;
                if (scrollTop > lastScrollTop && scrollTop > 200) { // زيادة العتبة لتجنب الإخفاء الفجائي
                    mobileNav.style.transform = 'translateY(100%)';
                } else if (scrollTop < lastScrollTop) {
                    mobileNav.style.transform = 'translateY(0)';
                }
                lastScrollTop = scrollTop;
            }
        });



        // ==================== Account Management Functions ====================
        window.switchTab = function(tabId) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.add('hidden'));
            const target = document.getElementById(`tab-${tabId}`);
            if (target) target.classList.remove('hidden');
            
            document.querySelectorAll('.account-tab').forEach(el => {
                el.classList.remove('active');
                el.classList.add('text-gray-500', 'hover:bg-white/5');
            });
            const activeTab = event.currentTarget;
            if (activeTab && activeTab.classList) {
                activeTab.classList.add('active');
                activeTab.classList.remove('text-gray-500', 'hover:bg-white/5');
            }
        };

        window.toggleAvatarMenu = function(e) {
            e.stopPropagation();
            const menu = document.getElementById('avatar-menu');
            menu.classList.toggle('hidden');
            
            const closer = () => {
                menu.classList.add('hidden');
                document.removeEventListener('click', closer);
            };
            document.addEventListener('click', closer);
        };

        window.handleAvatarUpload = function(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = async function(e) {
                    const avatarData = e.target.result;
                    document.getElementById('profile-preview-large').src = avatarData;
                    
                    try {
                        const res = await fetch('/api/me/update', {
                            method: 'PUT',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ userId: currentSession.userId, avatar: avatarData })
                        });
                        const data = await res.json();
                        if (data.success) {
                            currentSession.avatar = avatarData;
                            saveSession(currentSession);
                            showAlert('✅ تم تحديث الصورة الشخصية');
                            document.querySelectorAll('.user-avatar-display').forEach(el => el.src = avatarData);
                        }
                    } catch (err) { showAlert('❌ خطأ في الرفع', 'error'); }
                };
                reader.readAsDataURL(input.files[0]);
            }
        };

        window.deleteAvatar = async function() {
            const defaultAvatar = '/uploads/users/default.png';
            document.getElementById('profile-preview-large').src = defaultAvatar;
            try {
                const res = await fetch('/api/me/update', {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ userId: currentSession.userId, avatar: defaultAvatar })
                });
                const data = await res.json();
                if (data.success) {
                    currentSession.avatar = defaultAvatar;
                    saveSession(currentSession);
                    showAlert('🗑️ تم حذف الصورة الشخصية');
                    document.querySelectorAll('.user-avatar-display').forEach(el => el.src = defaultAvatar);
                }
            } catch (err) { showAlert('❌ خطأ في الحذف', 'error'); }
        };

        window.saveInlineName = async function(el) {
            const newName = el.textContent.trim();
            if (!newName || newName === (currentSession.name || currentSession.username)) return;

            try {
                const res = await fetch('/api/me/update', {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ userId: currentSession.userId, name: newName })
                });
                const data = await res.json();
                if (data.success) {
                    currentSession.name = newName;
                    saveSession(currentSession);
                    showAlert('✅ تم تحديث الاسم بنجاح');
                    document.querySelectorAll('.user-name-display').forEach(item => item.textContent = newName);
                }
            } catch (err) { showAlert('❌ خطأ في حفظ الاسم', 'error'); }
        };

        window.handlePasswordUpdate = async function(e) {
            e.preventDefault();
            const password = document.getElementById('update-password').value;
            const confirm = document.getElementById('confirm-password').value;

            if (!password || password !== confirm) {
                return showAlert('❌ كلمات المرور غير متطابقة', 'error');
            }
            if (password.length < 4) {
                return showAlert('❌ كلمة المرور قصيرة جداً', 'error');
            }

            try {
                const res = await fetch('/api/me/update', {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ userId: currentSession.userId, password })
                });
                const data = await res.json();
                if (data.success) {
                    showAlert('✅ تم تحديث كلمة المرور بنجاح');
                    e.target.reset();
                } else {
                    showAlert('❌ حدث خطأ: ' + data.error, 'error');
                }
            } catch (err) {
                showAlert('❌ خطأ في الاتصال بالسيرفر', 'error');
            }
        };

        // window.onload removed to avoid conflict with DOMContentLoaded
    </script>

    <!-- Login Modal -->
    <div id="login-modal"
        class="fixed inset-0 z-[200] bg-black/90 backdrop-blur-sm flex items-center justify-center transition-all duration-300"
        style="display: none;">
        <div class="bg-[#12141c] border border-white/10 p-8 rounded-2xl shadow-2xl max-w-sm w-full mx-4">
            <h2 class="text-2xl font-black text-white text-center mb-6">تسجيل الدخول</h2>
            <form id="login-form" onsubmit="handleLogin(event)">
                <div class="mb-4">
                    <label class="block text-gray-400 text-sm font-bold mb-2 text-right">اسم المستخدم</label>
                    <input type="text" id="login-username"
                        class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-primary text-right"
                        required>
                </div>
                <div class="mb-6">
                    <label class="block text-gray-400 text-sm font-bold mb-2 text-right">كلمة المرور</label>
                    <input type="password" id="login-password"
                        class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-primary text-right"
                        required>
                </div>
                <button type="submit"
                    class="w-full bg-primary text-black font-black py-3 rounded-xl hover:bg-white transition-colors shadow-[0_0_15px_rgba(27,214,142,0.3)]">دخول</button>
                <div id="login-error" class="text-red-500 text-sm font-bold mt-4 text-center hidden"></div>
            </form>
        </div>
    </div>

</body>

</html>
