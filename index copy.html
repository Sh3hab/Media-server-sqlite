                        </h3>
                        <div id="player-sug" class="grid grid-cols-2 sm:grid-cols-4 md:grid-cols-6 gap-4">
                            <!-- سيتم تعبئتها بالجافاسكربت -->
                        </div>
                    </div>
                </div>
            </div>
        </div>`;
            },

            search() {
                return `
                    <div class="min-h-screen pt-32 px-6 lg:pr-40 container-custom">
                        <div class="relative group mb-20 max-w-4xl mx-auto">
                            <i class="fa-solid fa-search absolute top-1/2 right-8 -translate-y-1/2 text-gray-600 group-focus-within:text-primary transition-colors text-2xl"></i>
                            <input type="text" onkeyup="Views.doSearch(this.value)" placeholder="ابحث عن أفلام، مسلسلات، أو فنانين..." class="w-full bg-surface border-2 border-white/5 rounded-[2rem] py-5 lg:py-6 pr-20 pl-10 text-xl lg:text-2xl font-black focus:outline-none focus:border-primary/30 focus:bg-primary/5 transition-all shadow-2xl">
                        </div>
                        <div id="search-res" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-6 xl:grid-cols-8 gap-8"></div>
                    </div>`;
            },

            async doSearch(q) {
                if (q.length < 2) return;
                const res = await fetch(`${API_BASE}/search?q=${q}`).then(r => r.json());
                document.getElementById('search-res').innerHTML = res.map(i => i.type === 'actor' ? `
                    <div onclick="Router.go('actor', {id: '${i.id}'})" class="text-center group cursor-pointer">
                        <div class="aspect-square rounded-full overflow-hidden mb-4 border-4 border-transparent group-hover:border-primary transition-all shadow-xl"><img src="${i.image}" class="w-full h-full object-cover"></div>
                        <h4 class="font-black text-sm group-hover:text-primary">${i.name}</h4>
                        <p class="text-[10px] text-primary font-black uppercase mt-1">فنان</p>
                    </div>` : UI.card(i)).join('');
            },

            async grid(type) {
                const res = await fetch(`${API_BASE}/${type}`);
                const data = await res.json();
                return `
                    <div class="min-h-screen pt-32 px-6 lg:pr-40 pb-20 container-custom">
                        ${UI.back()}
                        <h1 class="text-4xl font-black mb-16 text-right flex items-center justify-end gap-5">${type === 'movies' ? 'مكتبة الأفلام' : 'جميع المسلسلات'} <span class="w-1.5 h-10 bg-primary rounded-full"></span></h1>
                        <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-6 xl:grid-cols-10 gap-6">${data.map(i => UI.card(i)).join('')}</div>
                    </div>`;
            }
        };

        // ==========================================
        // 4. محرك المشغل المتطور (Netflix Experience)
        // ==========================================
        const PlayerEngine = {
            player: null,

            currentSubtitle: null,
            currentQuality: 'auto',
            keyboardShortcuts: {
                'space': 'playPause',
                'ArrowRight': 'skipForward',
                'ArrowLeft': 'skipBackward',
                'ArrowUp': 'volumeUp',
                'ArrowDown': 'volumeDown',
                'f': 'fullscreen',
                'm': 'mute',
                'p': 'pictureInPicture',
                '>': 'speedUp',
                '<': 'speedDown',
                '0': 'restart',
                'c': 'toggleSubtitles'
            },

            init() {
                const vidId = document.querySelector('[data-vid]')?.dataset.vid;
                if (!vidId) return;

                // ✅ إعدادات متقدمة للمشغل
                this.setupPlayer(vidId);
                this.loadSubtitles(vidId);
                this.setupKeyboardControls();
                this.setupGestures();
                this.loadSuggestions();
            },

            setupPlayer(vidId) {
                const videoElement = document.getElementById('ultra-v');
                if (!videoElement) return;

                // تدمير المشغل القديم إن وجد
                if (this.player) {
                    try { this.player.dispose(); } catch (e) { }
                }

                // ✅ إنشاء مشغل بمواصفات نيتفليكس
                this.player = videojs('ultra-v', {
                    fluid: true,
                    controls: false,
                    autoplay: true,
                    preload: 'auto',
                    playbackRates: [0.5, 0.75, 1, 1.25, 1.5, 1.75, 2],
                    html5: {
                        vhs: {
                            overrideNative: true,
                            fastQualityChange: true,
                            useBandwidthFromLocalStorage: true
                        },
                        nativeAudioTracks: false,
                        nativeVideoTracks: false
                    },
                    userActions: {
                        hotkeys: true,
                        doubleClick: false
                    }
                });

                // ✅ تحديث الواجهة المخصصة
                this.setupCustomUI(vidId);

                // ✅ زيادة عداد المشاهدات
                this.player.one('play', () => {
                    fetch(`${API_BASE}/watch/${vidId}`).catch(() => { });
                });

                // ✅ حفظ واستعادة التقدم
                const savedTime = localStorage.getItem(`time_${vidId}`);
                if (savedTime) this.player.currentTime(parseFloat(savedTime));

                this.player.on('timeupdate', () => {
                    const currentTime = this.player.currentTime();
                    const duration = this.player.duration();
                    if (currentTime > 5 && duration) {
                        localStorage.setItem(`time_${vidId}`, currentTime);
                        localStorage.setItem(`prog_${vidId}`, (currentTime / duration) * 100);
                    }
                    this.updateCustomProgress();
                });

                // تحديث أيقونات التشغيل
                const updateIcons = () => {
                    const isPaused = this.player.paused();
                    document.getElementById('center-play-icon').className = isPaused ? 'fa-solid fa-play ml-2' : 'fa-solid fa-pause';
                    document.getElementById('bottom-play-icon').className = isPaused ? 'fa-solid fa-play' : 'fa-solid fa-pause';
                };
                this.player.on('play', updateIcons);
                this.player.on('pause', updateIcons);
                this.player.on('ended', () => this.showNextEpisodePrompt(vidId));
            },

            setupCustomUI(vidId) {
                const progressContainer = document.getElementById('custom-progress-container');

                // النقر على شريط التقدم للتقديم
                progressContainer.onclick = (e) => {
                    const rect = progressContainer.getBoundingClientRect();
                    const pos = (e.clientX - rect.left) / rect.width;
                    this.player.currentTime(pos * this.player.duration());
                };

                // التحكم بالصوت
                const volSlider = document.getElementById('volume-slider');
                volSlider.onclick = (e) => {
                    const rect = volSlider.getBoundingClientRect();
                    const vol = (e.clientX - rect.left) / rect.width;
                    this.player.volume(Math.max(0, Math.min(1, vol)));
                    this.updateVolumeUI();
                };
            },

            updateCustomProgress() {
                if (!this.player) return;
                const curr = this.player.currentTime();
                const total = this.player.duration();
                const progress = total ? (curr / total) * 100 : 0;

                document.getElementById('custom-progress-bar').style.width = `${progress}%`;
                document.getElementById('curr-time').textContent = this.formatTime(curr);
                document.getElementById('total-time').textContent = this.formatTime(total);
            },

            updateVolumeUI() {
                const vol = this.player.volume();
                const muted = this.player.muted();
                document.getElementById('volume-fill').style.width = `${muted ? 0 : vol * 100}%`;
                document.getElementById('volume-icon').className = (muted || vol === 0) ? 'fa-solid fa-volume-xmark' : (vol < 0.5 ? 'fa-solid fa-volume-low' : 'fa-solid fa-volume-high');
            },

            formatTime(seconds) {
                if (isNaN(seconds)) return "00:00";
                const h = Math.floor(seconds / 3600);
                const m = Math.floor((seconds % 3600) / 60);
                const s = Math.floor(seconds % 60);
                if (h > 0) return `${h}:${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
                return `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
            },

            // ✅ تحميل الترجمات المتاحة
            async loadSubtitles(vidId) {
                try {
                    const vidData = document.querySelector('[data-vid]');
                    const seriesId = vidData?.dataset.series;

                    // جلب بيانات المحتوى
                    const response = await fetch(`${API_BASE}/series/${seriesId || vidId}`);
                    const content = await response.json();

                    // البحث عن ملفات الترجمة
                    const subtitleUrls = [];

                    if (content.subtitleUrl) {
                        subtitleUrls.push({
                            label: 'العربية',
                            srclang: 'ar',
                            src: content.subtitleUrl,
                            default: true
                        });
                    }

                    // إضافة ترجمات الحلقات إذا وجدت
                    if (content.episodes) {
                        const episode = content.episodes.find(ep => ep.id === vidId);
                        if (episode?.subtitleUrl && !subtitleUrls.some(s => s.src === episode.subtitleUrl)) {
                            subtitleUrls.push({
                                label: 'العربية',
                                srclang: 'ar',
                                src: episode.subtitleUrl
                            });
                        }
                    }

                    // إضافة الترجمات إلى المشغل
                    if (subtitleUrls.length > 0 && this.player) {
                        const trackElement = document.createElement('track');
                        trackElement.kind = 'subtitles';
                        trackElement.label = subtitleUrls[0].label;
                        trackElement.srclang = subtitleUrls[0].srclang;
                        trackElement.src = subtitleUrls[0].src;
                        trackElement.default = true;

                        const videoEl = document.getElementById('ultra-v');
                        videoEl.appendChild(trackElement);

                        this.player.ready(() => {
                            this.player.addRemoteTextTrack({
                                kind: 'subtitles',
                                label: subtitleUrls[0].label,
                                language: subtitleUrls[0].srclang,
                                src: subtitleUrls[0].src,
                                default: true
                            }, true);
                        });
                    }
                } catch (error) {
                    console.error('Error loading subtitles:', error);
                }
            },

            showQualityMenu() {
                const qualities = [
                    { label: 'تلقائي', value: 'auto' },
                    { label: '4K Ultra HD', value: '2160' },
                    { label: '1080p Full HD', value: '1080' },
                    { label: '720p HD', value: '720' },
                    { label: '480p SD', value: '480' }
                ];

                const existing = document.querySelector('.custom-menu');
                if (existing) { existing.remove(); return; }

                const menu = document.createElement('div');
                menu.className = 'custom-menu';

                menu.innerHTML = `
            <div class="px-4 py-2 text-gray-500 text-[10px] uppercase font-black tracking-widest border-b border-white/5 mb-2">جودة الفيديو</div>
            ${qualities.map(q => `
                <div class="menu-item ${this.currentQuality === q.value ? 'active' : ''}" onclick="PlayerEngine.setQuality('${q.value}')">
                    <span>${q.label}</span>
                    ${this.currentQuality === q.value ? '<i class="fa-solid fa-check"></i>' : ''}
                </div>
            `).join('')}
        `;

                document.getElementById('p-container').appendChild(menu);
            },

            setQuality(val) {
                this.currentQuality = val;
                this.showNotification(`🎬 جودة: ${val === 'auto' ? 'تلقائي' : val + 'p'}`);
                document.querySelector('.custom-menu')?.remove();
            },

            // ✅ التحكم بلوحة المفاتيح (مثل نيتفليكس)
            setupKeyboardControls() {
                document.addEventListener('keydown', (e) => {
                    // تجاهل إذا كان في حقل إدخال
                    if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;

                    const key = e.key;
                    const action = this.keyboardShortcuts[key === ' ' ? 'space' : key];

                    if (action && this.player) {
                        e.preventDefault();
                        this[action]();
                    }
                });
            },

            toggleLock(btn) {
                const isLocked = btn.classList.toggle('active');
                const container = document.getElementById('p-container');
                const topBar = container.querySelector('.player-top-bar');
                const bottomBar = container.querySelector('.player-bottom-bar');
                const centerCtrls = container.querySelector('.netflix-center-controls');

                if (isLocked) {
                    btn.innerHTML = '<i class="fa-solid fa-lock"></i>';
                    topBar.classList.add('locked');
                    bottomBar.classList.add('locked');
                    centerCtrls.classList.add('locked');
                    this.showNotification('🔒 تم قفل الشاشة');
                } else {
                    btn.innerHTML = '<i class="fa-solid fa-lock-open"></i>';
                    topBar.classList.remove('locked');
                    bottomBar.classList.remove('locked');
                    centerCtrls.classList.remove('locked');
                    this.showNotification('🔓 تم فتح الشاشة');
                }
            },

            playPause() {
                if (this.player.paused()) {
                    this.player.play();
                } else {
                    this.player.pause();
                }
            },

            skipForward() {
                const currentTime = this.player.currentTime();
                this.player.currentTime(currentTime + 10);
                this.showNotification('⏩ +10 ثواني');
            },

            skipBackward() {
                const currentTime = this.player.currentTime();
                this.player.currentTime(currentTime - 10);
                this.showNotification('⏪ -10 ثواني');
            },

            volumeUp() {
                let volume = this.player.volume();
                volume = Math.min(volume + 0.1, 1);
                this.player.volume(volume);
                this.updateVolumeUI();
                this.showNotification(`🔊 ${Math.round(volume * 100)}%`);
            },

            volumeDown() {
                let volume = this.player.volume();
                volume = Math.max(volume - 0.1, 0);
                this.player.volume(volume);
                this.updateVolumeUI();
                this.showNotification(`🔉 ${Math.round(volume * 100)}%`);
            },

            fullscreen() {
                const container = document.getElementById('p-container');
                const icon = document.getElementById('full-icon');

                if (!document.fullscreenElement) {
                    if (container.requestFullscreen) container.requestFullscreen();
                    else if (container.webkitRequestFullscreen) container.webkitRequestFullscreen();
                    icon.className = 'fa-solid fa-compress';
                } else {
                    if (document.exitFullscreen) document.exitFullscreen();
                    else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
                    icon.className = 'fa-solid fa-expand';
                }
            },

            takeScreenshot() {
                const video = document.querySelector('video');
                const canvas = document.createElement('canvas');
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                canvas.getContext('2d').drawImage(video, 0, 0);

                const link = document.createElement('a');
                link.download = `screenshot-${Date.now()}.png`;
                link.href = canvas.toDataURL();
                link.click();
                this.showNotification('📸 تم حفظ لقطة الشاشة');
            },

            mute() {
                this.player.muted(!this.player.muted());
                this.updateVolumeUI();
                this.showNotification(this.player.muted() ? '🔇 كتم الصوت' : '🔊 تشغيل الصوت');
            },

            pictureInPicture() {
                const video = document.querySelector('video');
                if (document.pictureInPictureEnabled) {
                    if (document.pictureInPictureElement) {
                        document.exitPictureInPicture();
                        this.showNotification('🖼️ إلغاء صورة داخل صورة');
                    } else if (video) {
                        video.requestPictureInPicture();
                        this.showNotification('🖼️ وضع صورة داخل صورة');
                    }
                }
            },

            speedUp() {
                let rate = this.player.playbackRate();
                rate = Math.min(rate + 0.25, 2);
                this.player.playbackRate(rate);
                this.showNotification(`⚡ سرعة ${rate}x`);
            },

            speedDown() {
                let rate = this.player.playbackRate();
                rate = Math.max(rate - 0.25, 0.5);
                this.player.playbackRate(rate);
                this.showNotification(`🐢 سرعة ${rate}x`);
            },

            restart() {
                this.player.currentTime(0);
                this.player.play();
                this.showNotification('🔄 إعادة التشغيل');
            },

            toggleSubtitles() {
                if (!this.player) return;

                const tracks = this.player.textTracks();
                if (!tracks || tracks.length === 0) return;

                let anyVisible = false;
                for (let i = 0; i < tracks.length; i++) {
                    if (tracks[i].mode === 'showing') {
                        tracks[i].mode = 'hidden';
                        anyVisible = true;
                    } else if (tracks[i].mode === 'hidden') {
                        tracks[i].mode = 'showing';
                        anyVisible = true;
                        break;
                    }
                }

                this.showNotification(anyVisible ? '📝 إظهار الترجمة' : '🚫 إخفاء الترجمة');
            },

            // ✅ إشعارات سريعة
            showNotification(text) {
                const notification = document.createElement('div');
                notification.className = 'player-notification';
                notification.style.cssText = `
            position: absolute;
            top: 20%;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.8);
            color: #1bd68e;
            padding: 12px 24px;
            border-radius: 50px;
            font-weight: bold;
            z-index: 1000;
            border: 2px solid #1bd68e;
            backdrop-filter: blur(10px);
            animation: notificationFade 2s ease forwards;
        `;
                notification.textContent = text;

                const style = document.createElement('style');
                style.textContent = `
            @keyframes notificationFade {
                0% { opacity: 0; transform: translate(-50%, -20px); }
                10% { opacity: 1; transform: translate(-50%, 0); }
                90% { opacity: 1; transform: translate(-50%, 0); }
                100% { opacity: 0; transform: translate(-50%, -20px); }
            }
        `;
                document.head.appendChild(style);

                document.getElementById('p-container').appendChild(notification);
                setTimeout(() => notification.remove(), 2000);
            },

            // ✅ دعم الإيماءات (سحب للتحكم)
            setupGestures() {
                const container = document.getElementById('p-container');
                if (!container) return;

                let touchStartX = 0;
                let touchStartY = 0;

                container.addEventListener('touchstart', (e) => {
                    touchStartX = e.touches[0].clientX;
                    touchStartY = e.touches[0].clientY;
                });

                container.addEventListener('touchend', (e) => {
                    const touchEndX = e.changedTouches[0].clientX;
                    const touchEndY = e.changedTouches[0].clientY;

                    const deltaX = touchEndX - touchStartX;
                    const deltaY = touchEndY - touchStartY;

                    // سحب أفقي للتنقل
                    if (Math.abs(deltaX) > Math.abs(deltaY) && Math.abs(deltaX) > 50) {
                        if (deltaX < 0) { // سحب لليسار (تقدم)
                            this.skipForward();
                        } else { // سحب لليمين (رجوع)
                            this.skipBackward();
                        }
                    }

                    // سحب عمودي للتحكم بالصوت
                    if (Math.abs(deltaY) > Math.abs(deltaX) && Math.abs(deltaY) > 50) {
                        if (deltaY < 0) { // سحب لأعلى
                            this.volumeUp();
                        } else { // سحب لأسفل
                            this.volumeDown();
                        }
                    }
                });
            },

            // ✅ عرض الحلقة التالية
            showNextEpisodePrompt(vidId) {
                const vidData = document.querySelector('[data-vid]');
                const seriesId = vidData?.dataset.series;
                const seasonId = vidData?.dataset.season;
                const currentEp = parseInt(vidData?.dataset.episode || '0');

                if (seriesId && seasonId && currentEp) {
                    fetch(`${API_BASE}/episodes?seriesId=${seriesId}&seasonId=${seasonId}`)
                        .then(r => r.json())
                        .then(eps => {
                            const nextEp = eps.find(e => e.episodeNumber === currentEp + 1);

                            if (nextEp) {
                                const card = document.createElement('div');
                                card.className = 'next-episode-card';
                                card.style.cssText = `
                            position: absolute;
                            bottom: 100px;
                            right: 30px;
                            background: rgba(0,0,0,0.9);
                            backdrop-filter: blur(20px);
                            border: 2px solid #1bd68e;
                            border-radius: 16px;
                            padding: 20px;
                            width: 350px;
                            z-index: 100;
                            animation: slideInLeft 0.5s ease;
                        `;

                                card.innerHTML = `
                            <div class="flex items-center gap-4 mb-4">
                                <i class="fa-solid fa-forward-step text-primary text-2xl"></i>
                                <span class="text-white font-black">التالي</span>
                            </div>
                            <div class="flex gap-4 mb-4">
                                <img src="${nextEp.thumbnail || nextEp.poster}" 
                                     class="w-24 h-16 object-cover rounded-lg">
                                <div class="flex-1">
                                    <div class="text-primary text-sm font-black">حلقة ${nextEp.episodeNumber}</div>
                                    <div class="text-white font-bold">${nextEp.title || 'الحلقة التالية'}</div>
                                </div>
                            </div>
                            <div class="flex gap-3">
                                <button onclick="Router.go('player', {id: '${nextEp.id}', type: 'episode'})" 
                                    class="flex-1 bg-primary text-black py-3 rounded-xl font-black hover:bg-white transition-all">
                                    تشغيل
                                </button>
                                <button onclick="this.closest('.next-episode-card').remove()" 
                                    class="flex-1 bg-white/10 text-white py-3 rounded-xl font-black hover:bg-white/20 transition-all">
                                    إلغاء
                                </button>
                            </div>
                            <div class="text-center text-gray-500 text-sm mt-3">
                                سيتم التشغيل بعد <span id="next-countdown">10</span> ثواني
                            </div>
                        `;

                                document.getElementById('p-container').appendChild(card);

                                // عد تنازلي
                                let count = 10;
                                const timer = setInterval(() => {
                                    count--;
                                    const countEl = document.getElementById('next-countdown');
                                    if (countEl) countEl.textContent = count;

                                    if (count <= 0) {
                                        clearInterval(timer);
                                        Router.go('player', { id: nextEp.id, type: 'episode' });
                                    }
                                }, 1000);

                                // إلغاء العد إذا تم إغلاق الكارد
                                const closeBtn = card.querySelector('button:last-child');
                                closeBtn.onclick = () => {
                                    clearInterval(timer);
                                    card.remove();
                                };
                            }
                        });
                }
            },

            like() {
                const vidId = document.querySelector('[data-vid]').dataset.vid;
                fetch(`${API_BASE}/like/${vidId}`, { method: 'POST' })
                    .then(() => {
                        const btn = event.currentTarget;
                        btn.innerHTML = '<i class="fa-solid fa-thumbs-up text-primary text-xl"></i>';
                        this.showNotification('👍 شكراً على تقييمك');
                    });
            },

            share() {
                if (navigator.share) {
                    navigator.share({
                        title: document.title,
                        url: window.location.href
                    }).then(() => {
                        this.showNotification('✅ تم المشاركة');
                    });
                } else {
                    navigator.clipboard.writeText(window.location.href);
                    this.showNotification('📋 تم نسخ الرابط');
                }
            },

            addToWatchlist() {
                const vidId = document.querySelector('[data-vid]').dataset.vid;
                fetch(`${API_BASE}/watchlist/add`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contentId: vidId })
                }).then(() => {
                    const btn = event.currentTarget;
                    btn.innerHTML = '<i class="fa-solid fa-bookmark text-primary text-xl"></i>';
                    this.showNotification('✅ تمت الإضافة إلى قائمتي');
                });
            },

            loadSuggestions() {
                fetch(`${API_BASE}/home`)
                    .then(r => r.json())
                    .then(data => {
                        const sugEl = document.getElementById('player-sug');
                        if (sugEl) {
                            const items = data.latestMovies?.slice(0, 6) || [];
                            sugEl.innerHTML = items.map(m => `
                        <div onclick="Router.go('details', {id: '${m.id}'})" 
                             class="cursor-pointer group transform transition-all hover:scale-105">
                            <div class="aspect-[2/3] rounded-xl overflow-hidden shadow-lg">
                                <img src="${m.poster}" class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-500">
                            </div>
                            <h4 class="text-xs font-bold mt-2 text-center truncate group-hover:text-primary">${m.title}</h4>
                            <p class="text-[10px] text-gray-500 text-center">${m.year}</p>
                        </div>
                    `).join('');
                        }
                    });
            }
        };


        let lastScrollTop = 0;
        const mobileNav = document.getElementById('mobile-nav');

        window.addEventListener('scroll', () => {
            if (window.innerWidth < 768) {
                let scrollTop = window.scrollY || document.documentElement.scrollTop;
                if (scrollTop > lastScrollTop && scrollTop > 100) {
                    // التمرير لأسفل - اخفاء
                    mobileNav.style.transform = 'translateY(100%)';
                } else {
                    // التمرير لأعلى - اظهار
                    mobileNav.style.transform = 'translateY(0)';
                }
                lastScrollTop = scrollTop;
            }
        });




        window.onload = () => Router.go('home');
    </script>
</body>

</html>
