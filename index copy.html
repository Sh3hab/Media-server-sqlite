<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="MediaNet Ultra - ميديا نت ألترا: منصة مشاهدة الأفلام والمسلسلات الحصرية بجودة عالية وتصميم عصري.">
    <title>MediaNet Ultra | ميديا نت ألترا</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="script.js"></script>

    <link rel="stylesheet" href="fontawesome/fontawesome/css/all.min.css">

    <link href="css/font.css" rel="stylesheet">

    <link href="videojs/video-js.css" rel="stylesheet" />
    <script src="/videojs/video.min.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#1bd68e',
                        accent: '#ff0f1a',
                        obsidian: '#050608',
                        surface: '#11131a',
                        card: '#1a1d26'
                    },
                    fontFamily: { sans: ['Readex Pro', 'sans-serif'] }
                }
            }
        }
    </script>

    <style>
        :root {
            --p: #1bd68e;
            --bg: #050608;
        }

        body {
            background-color: var(--bg);
            color: #fff;
            -webkit-tap-highlight-color: transparent;
            scroll-behavior: smooth;
            overflow-x: hidden;
            font-family: 'Readex Pro', sans-serif;
        }

        .container-custom {
            max-width: 1440px;
            margin-left: auto;
            margin-right: auto;
        }

        /* ضمان عدم دخول أي عنصر تحت الشريط الجانبي */
        @media (min-width: 768px) {
            #app-root {
                margin-right: 0;
                max-width: calc(100vw - 96px);
                overflow-x: hidden;
            }

            
        }

        .glass {
            background: rgba(17, 19, 26, 0.6);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-top: 1px solid rgba(255, 255, 255, 0.05);
        }

        .sidebar-glass {
            background: rgba(11, 13, 20, 0.8);
            backdrop-filter: blur(25px);
            border-left: 1px solid rgba(255, 255, 255, 0.05);
        }

        .video-js.vjs-theme-ultra {
            font-family: 'Readex Pro', sans-serif;
            color: #fff;
            border-radius: 0;
        }

        .vjs-theme-ultra .vjs-big-play-button {
            background: rgba(27, 214, 142, 0.9) !important;
            border: none !important;
            border-radius: 50% !important;
            width: 80px !important;
            height: 80px !important;
            line-height: 80px !important;
            top: 50% !important;
            left: 50% !important;
            margin-top: -40px !important;
            margin-left: -40px !important;
            box-shadow: 0 0 40px rgba(27, 214, 142, 0.4);
            display: none !important;
            /* We will use custom center buttons */
        }

        .vjs-theme-ultra .vjs-play-progress {
            background-color: #1bd68e !important;
        }

        .vjs-theme-ultra .vjs-play-progress:before {
            color: #1bd68e !important;
        }

        .vjs-theme-ultra .vjs-load-progress {
            background: rgba(255, 255, 255, 0.2) !important;
        }

        .vjs-theme-ultra .vjs-slider {
            background-color: rgba(255, 255, 255, 0.1) !important;
        }

        .vjs-theme-ultra .vjs-control-bar {
            background: linear-gradient(0deg, rgba(0, 0, 0, 0.9) 0%, rgba(0, 0, 0, 0.5) 50%, transparent 100%) !important;
            height: 100px !important;
            align-items: flex-end !important;
            padding-bottom: 10px !important;
        }

        /* Netflix Center Controls */
        .netflix-center-controls {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            display: flex;
            align-items: center;
            gap: 40px;
            z-index: 100;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .ultra-player-container:hover .netflix-center-controls,
        .ultra-player-container.vjs-paused .netflix-center-controls {
            opacity: 1;
            pointer-events: all;
        }

        .netflix-center-controls.locked {
            display: none !important;
        }

        .center-btn {
            width: 70px;
            height: 70px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, 0.5);
            border-radius: 50%;
            color: white;
            font-size: 30px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .center-btn:hover {
            background: rgba(27, 214, 142, 0.8);
            transform: scale(1.1);
        }

        .center-btn.play-large {
            width: 90px;
            height: 90px;
            font-size: 40px;
        }

        /* Lock Button */
        .player-lock-btn {
            position: absolute;
            top: 50%;
            left: 20px;
            transform: translateY(-50%);
            z-index: 110;
            width: 50px;
            height: 50px;
            background: rgba(0, 0, 0, 0.5);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            cursor: pointer;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .ultra-player-container:hover .player-lock-btn {
            opacity: 1;
        }

        .player-lock-btn.active {
            color: #1bd68e;
            opacity: 1;
            background: rgba(0, 0, 0, 0.8);
        }

        .player-top-bar.locked {
            display: none !important;
        }

        /* Custom Bottom Bar */
        .player-bottom-bar {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(0deg, rgba(0, 0, 0, 0.95) 0%, rgba(0, 0, 0, 0.6) 50%, transparent 100%);
            padding: 20px 30px 30px 30px;
            z-index: 100;
            opacity: 0;
            transition: opacity 0.3s, transform 0.3s;
            transform: translateY(10px);
            pointer-events: none;
        }

        .ultra-player-container:hover .player-bottom-bar,
        .ultra-player-container.vjs-paused .player-bottom-bar {
            opacity: 1;
            transform: translateY(0);
            pointer-events: all;
        }

        .player-bottom-bar.locked {
            display: none !important;
        }

        /* Custom Progress Bar */
        .custom-progress-container {
            width: 100%;
            height: 6px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            cursor: pointer;
            position: relative;
            margin-bottom: 20px;
            transition: height 0.2s;
        }

        .custom-progress-container:hover {
            height: 10px;
        }

        .custom-progress-bar {
            position: absolute;
            left: 0;
            top: 0;
            height: 100%;
            background: var(--p);
            border-radius: 10px;
            width: 0%;
            transition: width 0.1s linear;
            box-shadow: 0 0 15px var(--p);
        }

        .custom-progress-handle {
            position: absolute;
            right: -8px;
            top: 50%;
            transform: translateY(-50%) scale(0);
            width: 16px;
            height: 16px;
            background: white;
            border-radius: 50%;
            transition: transform 0.2s;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.5);
        }

        .custom-progress-container:hover .custom-progress-handle {
            transform: translateY(-50%) scale(1);
        }

        /* Custom Control Buttons */
        .bottom-ctrl-btn {
            width: 45px;
            height: 45px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 20px;
            border-radius: 12px;
            transition: all 0.2s;
            cursor: pointer;
            position: relative;
        }

        .bottom-ctrl-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            color: var(--p);
            transform: translateY(-3px);
        }

        .bottom-ctrl-btn:active {
            scale: 0.9;
        }

        /* Volume Slider */
        .volume-container {
            display: flex;
            align-items: center;
            gap: 10px;
            width: 45px;
            overflow: hidden;
            transition: width 0.3s;
        }

        .volume-container:hover {
            width: 150px;
        }

        .volume-slider {
            width: 100px;
            height: 4px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            cursor: pointer;
            position: relative;
        }

        .volume-fill {
            height: 100%;
            background: var(--p);
            border-radius: 10px;
            width: 100%;
        }

        /* Mobile Tap Regions */
        .tap-region {
            position: absolute;
            top: 0;
            bottom: 100px;
            width: 30%;
            z-index: 50;
        }

        .tap-left {
            left: 0;
        }

        .tap-right {
            right: 0;
        }

        /* Custom Animations */
        .page-fade {
            animation: pageFade 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        @keyframes pageFade {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .scrollbar-hide::-webkit-scrollbar {
            display: none;
        }

        .card-glow:hover {
            box-shadow: 0 0 20px rgba(27, 214, 142, 0.2);
            border-color: rgba(27, 214, 142, 0.4);
        }

        /* Speed Overlay */
        .speed-overlay {
            position: absolute;
            top: 25%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.8);
            color: #1bd68e;
            padding: 12px 24px;
            border-radius: 50px;
            font-weight: 800;
            border: 1px solid #1bd68e;
            z-index: 100;
            pointer-events: none;
            display: none;
            box-shadow: 0 0 20px rgba(27, 214, 142, 0.3);
        }

        /* --- Hero Slider Styles (Updated) --- */
        #hero-slider-container {
            display: flex;
            transition: transform 0.6s cubic-bezier(0.23, 1, 0.32, 1);
            will-change: transform;
            height: 100%;
            touch-action: pan-y;
            /* يسمح بالسحب العمودي ويمنع تداخل الأفقي */
        }

        /* حالة السحب: تعطيل الانميشن لتتبع الإصبع */
        #hero-slider-container.dragging {
            transition: none !important;
        }

        .hero-mask {
            background: linear-gradient(to top, #050608 0%, rgba(5, 6, 8, 0.8) 40%, transparent 100%);
        }

        .side-mask {
            background: linear-gradient(to left, #050608 0%, rgba(5, 6, 8, 0.4) 50%, transparent 100%);
        }

        .slide {
            transition: opacity 0.5s ease;
        }

        /* تنسيق النقاط */
        .hero-dot {
            transition: all 0.4s ease;
            background-color: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .hero-dot.active {
            background-color: var(--p) !important;
            width: 2.5rem !important;
            border-color: var(--p) !important;
        }

        .slide-in-rtl {
            animation: slideInRTL 0.4s ease-out forwards;
        }

        @keyframes slideInRTL {
            from {
                opacity: 0;
                transform: translateX(30px);
           
            }

            to {
                opacity: 1;
                transform: translateX(0);
            }
        }


        .seasons-wrapper {
            position: relative;
            display: inline-flex;
            flex-direction: row-reverse;
            background: rgba(255, 255, 255, 0.05);
            padding: 6px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            gap: 4px;
            z-index: 1;
        }

        .season-indicator {
            position: absolute;
            top: 6px;
            bottom: 6px;
            background: var(--p);
            border-radius: 20px;
            transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
            z-index: 0;
            box-shadow: 0 4px 15px rgba(27, 214, 142, 0.3);
            opacity: 1 !important;
        }

        .season-btn {
            position: relative;
            z-index: 1;
            padding: 8px 20px;
            font-weight: 900;
            font-size: 0.875rem;
            transition: all 0.3s;
            border-radius: 20px;
        }

        .active-season {
            color: black !important;
        }





        /* تصميم التاب بار في الهيدر للجوال */
        .active-tab {
            color: #1bd68e !important;
        }

        .active-tab .tab-line {
            width: 100% !important;
            opacity: 1;
        }

        /* نقاط الممثلين الذكية */
        .actor-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.2);
            transition: all 0.3s ease;
        }

        .actor-dot.active {
            background: #1bd68e;
            width: 18px;
            border-radius: 10px;
        }

        /* تحسين التمرير */
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }

        /* ===== مشغل UltraTV - تصميم متكامل ===== */
        .ultra-player-container {
            position: relative;
            width: 100%;
            background: black;
            direction: ltr;
            /* مهم لمفاتيح التحكم */
        }

        /* شاشة البداية (Poster) */
        .ultra-poster {
            position: absolute;
            inset: 0;
            background-size: cover;
            background-position: center;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10;
            transition: opacity 0.3s;
        }

        .ultra-poster.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .ultra-big-play {
            width: 90px;
            height: 90px;
            background: rgba(27, 214, 142, 0.9);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 0 30px rgba(27, 214, 142, 0.5);
        }

        .ultra-big-play i {
            font-size: 40px;
            color: black;
            margin-left: 5px;
            /* تعويض لوسط الزر */
        }

        .ultra-big-play:hover {
            transform: scale(1.1);
            background: #fff;
        }

        .ultra-big-play:hover i {
            color: #1bd68e;
        }

        /* شريط التحكم الرئيسي */
        .ultra-controls {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(transparent, rgba(0, 0, 0, 0.9));
            padding: 20px 20px 15px;
            z-index: 20;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
        }

        .ultra-player-container.show-controls .ultra-controls,
        .ultra-player-container:hover .ultra-controls {
            opacity: 1;
            pointer-events: all;
        }

        /* شريط التقدم */
        .ultra-progress-container {
            width: 100%;
            margin-bottom: 15px;
            cursor: pointer;
            position: relative;
            height: 5px;
        }

        .ultra-progress-bg {
            width: 100%;
            height: 5px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            position: relative;
            overflow: hidden;
        }

        .ultra-progress-fill {
            height: 100%;
            background: #1bd68e;
            border-radius: 10px;
            position: relative;
            width: 0%;
            transition: width 0.1s linear;
        }

        .ultra-progress-buffered {
            position: absolute;
            top: 0;
            left: 0;
            height: 100%;
            background: rgba(255, 255, 255, 0.4);
            border-radius: 10px;
            width: 0%;
        }

        .ultra-progress-handle {
            width: 13px;
            height: 13px;
            background: #1bd68e;
            border-radius: 50%;
            position: absolute;
            top: 50%;
            transform: translate(-50%, -50%);
            left: 0;
            opacity: 0;
            transition: opacity 0.2s;
            box-shadow: 0 0 10px rgba(27, 214, 142, 0.5);
        }

        .ultra-progress-container:hover .ultra-progress-handle {
            opacity: 1;
        }

        /* أزرار التحكم */
        .ultra-controls-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-direction: row-reverse;
            color: white;
        }

        .ultra-controls-group {
            display: flex;
            align-items: center;
            gap: 20px;
            flex-direction: row-reverse;
        }

        .ultra-control-btn {
            background: none;
            border: none;
            color: white;
            font-size: 20px;
            cursor: pointer;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .ultra-control-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            color: #1bd68e;
        }

        .ultra-control-btn:active {
            transform: scale(0.9);
        }

        .ultra-control-btn.active {
            color: #1bd68e;
        }

        /* وقت التشغيل */
        .ultra-time {
            font-size: 14px;
            font-weight: bold;
            color: white;
            margin: 0 5px;
            direction: ltr;
            font-family: monospace;
        }

        /* شريط الصوت */
        .ultra-volume-container {
            position: relative;
            display: flex;
            align-items: center;
        }

        .ultra-volume-slider {
            width: 0;
            height: 5px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            margin-right: 10px;
            overflow: hidden;
            transition: width 0.2s;
        }

        .ultra-volume-container:hover .ultra-volume-slider {
            width: 80px;
        }

        .ultra-volume-fill {
            height: 100%;
            background: #1bd68e;
            width: 100%;
        }

        .ultra-volume-btn {
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        /* سرعة التشغيل */
        .ultra-speed-menu {
            position: absolute;
            bottom: 50px;
            left: 0;
            background: rgba(20, 20, 20, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 8px;
            display: none;
            z-index: 30;
        }

        .ultra-speed-menu.show {
            display: block;
        }

        .ultra-speed-item {
            padding: 10px 20px;
            color: white;
            cursor: pointer;
            border-radius: 8px;
            text-align: center;
            font-size: 14px;
            transition: all 0.2s;
        }

        .ultra-speed-item:hover {
            background: rgba(27, 214, 142, 0.2);
            color: #1bd68e;
        }

        .ultra-speed-item.active {
            background: #1bd68e;
            color: black;
            font-weight: bold;
        }

        /* شاشة القفل للتحكم بالريموت */
        .ultra-focus-indicator {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            border: 3px solid #1bd68e;
            border-radius: 4px;
            pointer-events: none;
            z-index: 25;
            opacity: 0;
            transition: opacity 0.2s;
            box-shadow: 0 0 20px rgba(27, 214, 142, 0.3);
        }

        .ultra-player-container.focused .ultra-focus-indicator {
            opacity: 1;
        }

        /* إشعارات سريعة (مثل تغيير الصوت) */
        .ultra-notification {
            position: absolute;
            top: 20%;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.8);
            color: white;
            padding: 15px 30px;
            border-radius: 50px;
            border: 2px solid #1bd68e;
            font-size: 24px;
            font-weight: bold;
            z-index: 100;
            display: none;
            align-items: center;
            gap: 15px;
            backdrop-filter: blur(10px);
        }

        .ultra-notification.show {
            display: flex;
        }

        /* قائمة الجودة */
        .ultra-quality-menu {
            position: absolute;
            bottom: 50px;
            right: 0;
            background: rgba(20, 20, 20, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 8px;
            display: none;
            z-index: 30;
            min-width: 150px;
        }

        .ultra-quality-menu.show {
            display: block;
        }

        .ultra-quality-item {
            padding: 10px 20px;
            color: white;
            cursor: pointer;
            border-radius: 8px;
            text-align: center;
            font-size: 14px;
            transition: all 0.2s;
        }

        .ultra-quality-item:hover {
            background: rgba(27, 214, 142, 0.2);
            color: #1bd68e;
        }

        .ultra-quality-item.active {
            background: #1bd68e;
            color: black;
            font-weight: bold;
        }

        /* تكيف مع الجوال */
        @media (max-width: 768px) {
            .ultra-big-play {
                width: 70px;
                height: 70px;
            }

            .ultra-big-play i {
                font-size: 30px;
            }

            .ultra-control-btn {
                width: 35px;
                height: 35px;
                font-size: 16px;
            }

            .ultra-volume-container:hover .ultra-volume-slider {
                width: 50px;
            }
        }

        /* تحسين الترجمة */
        .vjs-text-track-display {
            bottom: 120px !important;
            font-size: 24px !important;
            font-family: 'Readex Pro', sans-serif !important;
            text-shadow: 2px 2px 10px rgba(0, 0, 0, 1) !important;
        }

        @media (max-width: 768px) {
            .vjs-text-track-display {
                font-size: 18px !important;
                bottom: 100px !important;
            }
        }

        /* قائمة الجودة والترجمة */
        .custom-menu {
            position: absolute;
            bottom: 85px;
            right: 30px;
            background: rgba(11, 13, 20, 0.95);
            backdrop-filter: blur(30px);
            border-radius: 20px;
            padding: 12px;
            z-index: 200;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.8);
            min-width: 200px;
            animation: menuShow 0.3s cubic-bezier(0.18, 1, 0.32, 1);
        }

        @keyframes menuShow {
            from {
                opacity: 0;
                transform: translateY(10px) scale(0.95);
            }

            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .menu-item {
            padding: 12px 20px;
            color: white;
            cursor: pointer;
            border-radius: 12px;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-weight: bold;
            font-size: 14px;
        }

        .menu-item:hover {
            background: rgba(255, 255, 255, 0.05);
            color: var(--p);
        }

        .menu-item.active {
            background: var(--p);
            color: black;
        }

        /* قائمة الجودة المخصصة */
        .quality-menu {
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .quality-item:hover {
            background: rgba(27, 214, 142, 0.2) !important;
            color: #1bd68e !important;
        }

        /* تحسين الترجمة */
        .vjs-text-track-display {
            bottom: 70px !important;
            font-size: 20px !important;
            font-family: 'Readex Pro', sans-serif !important;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.8) !important;
        }

        @media (max-width: 768px) {
            .vjs-text-track-display {
                font-size: 16px !important;
                bottom: 60px !important;
            }
        }

        /* إشعارات سريعة */
        .player-notification {
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            font-family: 'Readex Pro', sans-serif;
            letter-spacing: 0.5px;
        }

        /* كارد الحلقة التالية */
        .next-episode-card {
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
            border: 2px solid rgba(27, 214, 142, 0.5);
        }

        @keyframes slideInLeft {
            from {
                opacity: 0;
                transform: translateX(50px);
            }

            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        /* مؤشر وقت التشغيل */
        .vjs-current-time-display,
        .vjs-duration-display {
            font-weight: bold !important;
            font-family: 'Readex Pro', sans-serif !important;
        }

        /* زر صورة داخل صورة */
        .vjs-picture-in-picture-control {
            display: inline-block !important;
        }

        /* مؤشر سرعة التشغيل */
        .speed-indicator {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.8);
            color: #1bd68e;
            padding: 10px 20px;
            border-radius: 50px;
            font-size: 24px;
            font-weight: bold;
            border: 2px solid #1bd68e;
            z-index: 100;
            animation: speedPulse 1s ease;
        }

        @keyframes speedPulse {
            0% {
                opacity: 0;
                transform: translate(-50%, -50%) scale(0.8);
            }

            50% {
                opacity: 1;
                transform: translate(-50%, -50%) scale(1.1);
            }

            100% {
                opacity: 1;
                transform: translate(-50%, -50%) scale(1);
            }
        }
    </style>
</head>

<body class="md:pr-24 transition-all duration-500">

    <aside

            M

                data-view="home">

            <button onclick="Router.go('movies')" class="mobile-nav-link flex flex-col items-center gap-1 text-gray-500"

    <!-- الدرج الجانبي للجوال (Mobile Drawer) - يظهر عند الضغط على "المزيد" -->

        <div
            class="absolute top-0 bottom-0 right-0 w-72 bg-obsidian border-l border-white/5 p-8 transform translate-x-0 transition-transform duration-300">

                    <div>
                        <h4 class="font-black text-white">شهاب</h4>
                        <p class="text-gray-500 text-sm">مشترك مميز</p>
                    </div>
                </div>

                <button onclick="Router.go('watchlist')"
                    class="flex items-center gap-4 text-gray-400 hover:text-primary transition-colors text-right">

                    class="flex items-center gap-4 text-gray-400 hover:text-primary transition-colors text-right">

                </button>

                    class="flex items-center gap-4 text-red-500 hover:text-red-400 transition-colors text-right mt-10 pt-6 border-t border-white/5">

    <script>
        const API_BASE = '/api';
        const State = { view: 'home', params: {}, player: null };

        // 1. إدارة التوجيه (Router)
        const Router = {
            async go(view, params = {}) {
                State.view = view;
                State.params = params;
                window.scrollTo({ top: 0, behavior: 'smooth' });
                this.updateActiveNav();
                await this.render();
            },
            updateActiveNav() {
                document.querySelectorAll('.nav-link').forEach(el => {
                    el.classList.toggle('active', el.dataset.view === State.view);
                });
            },
            async render() {
                const root = document.getElementById('app-root');
                root.innerHTML = `<div class="h-screen flex items-center justify-center"><div class="w-12 h-12 border-4 border-primary border-t-transparent rounded-full animate-spin"></div></div>`;

                try {
                    let html = '';
                    switch (State.view) {
                        case 'home': html = await Views.home(); break;
                        case 'details':
                            html = await Views.details(State.params.id);
                            root.innerHTML = `<div class="page-fade">${html}</div>`;
                            Views.initSeasonMarker();
                            return; // الخروج مبكراً لمنع التكرار أدناه
                        case 'actor': html = await Views.actor(State.params.id); break;
                        case 'player': html = await Views.player(State.params.id, State.params.type); break;
                        case 'search': html = Views.search(); break;
                        case 'movies': html = await Views.grid('movies'); break;
                        case 'series': html = await Views.grid('series'); break;
                    }
                    root.innerHTML = `<div class="page-fade">${html}</div>`;
                    if (State.view === 'player') PlayerEngine.init();
                } catch (e) {
                    console.error(e);
                    root.innerHTML = `<div class="h-screen flex flex-col items-center justify-center text-center px-6"><h2 class="text-2xl font-bold mb-4 text-red-500">حدث خطأ</h2><button onclick="Router.go('home')" class="bg-primary text-black px-8 py-3 rounded-xl font-bold">العودة للرئيسية</button></div>`;
                }
            }
        };

        // 2. المكونات (UI Components)
        const UI = {
            card(item) {
                if (!item) return '';
                const prog = localStorage.getItem(`prog_${item.id}`) || 0;
                return `
                    <div onclick="Router.go('details', {id: '${item.id}'})" class="group cursor-pointer">
                        <div class="relative aspect-[2/3] rounded-2xl overflow-hidden bg-surface border border-white/5 transition-all duration-500 card-glow group-hover:-translate-y-2">
                            <img src="${item.poster || '/uploads/posters/default.jpg'}" class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-110" loading="lazy">
                            <div class="absolute inset-0 bg-gradient-to-t from-black via-transparent opacity-0 group-hover:opacity-100 transition-opacity flex items-center justify-center">
                                <div class="w-12 h-12 bg-primary rounded-full flex items-center justify-center text-black shadow-xl scale-50 group-hover:scale-100 transition-all">
                                    <i class="fa-solid fa-play ml-1"></i>
                                </div>
                            </div>
                            <div class="absolute top-2 right-2 bg-black/60 backdrop-blur px-2 py-0.5 rounded text-[10px] font-black border border-white/10">
                                <i class="fa-solid fa-star text-yellow-500 mr-1"></i>${item.rating || '0.0'}
                            </div>
                            <div class="absolute top-2 left-2 bg-black/60 backdrop-blur px-2 py-0.5 rounded text-[10px] font-black border border-white/10">
                                <span>${item.tags}</span>
                            </div>
                            ${prog > 0 ? `<div class="thumb-progress"><div class="thumb-progress-fill" style="width: ${prog}%"></div></div>` : ''}
                        </div>
                        <h3 class="mt-3 text-xs md:text-sm font-bold truncate group-hover:text-primary transition-colors text-right px-1">${item.title}</h3>
                        <div class="flex justify-between items-center px-1 mt-1 text-[10px] text-gray-500 font-bold">
                            <span>${item.year}</span>
                            <span class="bg-white/5 px-1.5 rounded uppercase">${item.isMovie ? 'فيلم' : 'مسلسل'}</span>
                        </div>
                    </div>
                `;
            },
            back() {
                return `<button onclick="window.history.back()" class="fixed top-6 right-6 md:right-32 z-[160] w-12 h-12 bg-white/5 backdrop-blur-xl rounded-full flex items-center justify-center text-white border border-white/10 hover:bg-primary hover:text-black transition-all shadow-2xl active:scale-90"><i class="fa-solid fa-arrow-right"></i></button>`;
            }
        };

        // 3. المشاهد (Views)
        const Views = {
            // تعريف المتغيرات لمنع الأخطاء
            currentSlide: 0,
            slideCount: 0,
            sliderInterval: null,
            startX: 0,
            isDragging: false,

            // --- الصفحة الرئيسية والسلايدر ---
            async home() {
                const res = await fetch(`${API_BASE}/home`);
                const data = await res.json();
                const promos = data.featured || [];

                const renderSlide = (item, index) => `
                    <div class="slide min-w-full h-full relative overflow-hidden select-none bg-obsidian">
                        <div class="absolute inset-0 md:w-3/5 lg:w-2/3 h-full md:left-0 z-0">
                            <img src="${item.poster}" class="w-full h-full object-cover object-top opacity-70">
                            <div class="absolute inset-0 bg-gradient-to-r from-obsidian via-transparent to-transparent hidden md:block"></div>
                            <div class="absolute inset-0 bg-gradient-to-t from-obsidian via-obsidian/30 to-transparent"></div>
                        </div>
                        
                        <div class="absolute inset-0 flex flex-col justify-end md:justify-center p-8 md:p-20 lg:p-32 z-10 text-right md:w-1/2 lg:w-2/5 mr-0 ml-auto bg-gradient-to-t from-obsidian md:from-transparent via-transparent to-transparent">
                            <div class="flex items-center justify-end gap-3 mb-6">
                                <span class="bg-primary text-black px-4 py-1 rounded-full text-[10px] font-black uppercase tracking-widest shadow-lg shadow-primary/20">
                                    ${item.isMovie ? 'فيلم مميز' : 'مسلسل مميز'}
                                </span>
                                <span class="bg-white/10 backdrop-blur px-4 py-1 rounded-full text-[10px] font-black">${item.year}</span>
                            </div>
                            <h1 class="text-3xl lg:text-7xl font-black mb-8 leading-none tracking-tighter drop-shadow-2xl text-white">${item.title}</h1>
                            <p class="text-gray-400 max-w-xl text-sm lg:text-lg mb-10 line-clamp-3 leading-relaxed font-light opacity-80">${item.description}</p>
                            
                            <div class="flex flex-row-reverse gap-4">
                                <button onclick="Router.go('details', {id: '${item.id}'})" class="bg-primary text-black px-10 py-4 lg:px-14 lg:py-5 rounded-2xl font-black text-base lg:text-lg hover:bg-white hover:scale-105 active:scale-95 transition-all shadow-xl shadow-primary/20 flex items-center gap-3">
                                    <i class="fa-solid fa-play"></i> شاهد الآن
                                </button>
                                <button class="bg-white/5 backdrop-blur text-white px-8 py-4 lg:px-10 lg:py-5 rounded-2xl font-black border border-white/10 hover:bg-white/10 transition-all"><i class="fa-solid fa-plus ml-2"></i> قائمتي</button>
                            </div>
                        </div>
                    </div>`;

                setTimeout(() => this.initHeroSlider(promos.length), 200);

                return `
                    <div class="space-y-16">
                        ${promos.length > 0 ? `
                        <section class="relative h-[65vh] lg:h-[85vh] w-full overflow-hidden bg-black group">
                            <div id="hero-slider-container" class="h-full">
                                ${promos.map((p, i) => renderSlide(p, i)).join('')}
                            </div>

                            ${promos.length > 1 ? `
                            <div class="absolute bottom-10 left-0 w-full z-30 flex justify-center gap-2 flex-row-reverse">
                                ${promos.map((_, i) => `<div class="hero-dot w-2 h-2 rounded-full cursor-pointer" onclick="Views.jumpToSlide(${i})"></div>`).join('')}
                            </div>` : ''}
                        </section>` : ''}

                        <div class="px-6 md:px-16 space-y-20 ${promos.length > 0 ? '-mt-20' : 'mt-10'} relative z-20 pb-20 container-custom">
                            <section>
                                <div class="flex flex-row-reverse items-center justify-between mb-10 text-right">
                                    <h2 class="text-3xl font-black flex flex-row-reverse items-center gap-4">أحدث الأفلام <span class="w-1.5 h-8 bg-primary rounded-full shadow-[0_0_15px_#1bd68e]"></span></h2>
                                    <button onclick="Router.go('movies')" class="text-primary text-sm font-black hover:underline">عرض الكل</button>
                                </div>
                                <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-6 xl:grid-cols-8 gap-6">${(data.latestMovies || []).map(m => UI.card(m)).join('')}</div>
                            </section>
                            <section>
                                <div class="flex flex-row-reverse items-center justify-between mb-10 text-right">
                                    <h2 class="text-3xl font-black flex flex-row-reverse items-center gap-4">أحدث المسلسلات <span class="w-1.5 h-8 bg-primary rounded-full shadow-[0_0_15px_#1bd68e]"></span></h2>
                                    <button onclick="Router.go('series')" class="text-primary text-sm font-black hover:underline">عرض الكل</button>
                                </div>
                                <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-6 xl:grid-cols-8 gap-6">${(data.latestSeries || []).map(s => UI.card(s)).join('')}</div>
                            </section>
                        </div>
                    </div>`;
            },

            // --- دوال التحكم في السلايدر ودعم اللمس ---
            initHeroSlider(count) {
                if (count <= 1) return;
                this.slideCount = count;
                this.currentSlide = 0;
                const container = document.getElementById('hero-slider-container');
                if (!container) return;

                // دعم اللمس والسحب (Drag Logic)
                container.addEventListener('touchstart', (e) => {
                    this.isDragging = true;
                    this.startX = e.touches[0].clientX;
                    container.classList.add('dragging');
                    clearInterval(this.sliderInterval);
                }, { passive: true });

                container.addEventListener('touchmove', (e) => {
                    if (!this.isDragging) return;
                    const currentX = e.touches[0].clientX;
                    const diff = currentX - this.startX;
                    // معادلة الحركة: (الشريحة الحالية * 100) + (إزاحة الإصبع كنسبة مئوية)
                    const move = (this.currentSlide * 100) - (diff / window.innerWidth * 100);
                    container.style.transform = `translateX(${move}%)`;
                }, { passive: true });

                container.addEventListener('touchend', (e) => {
                    this.isDragging = false;
                    container.classList.remove('dragging');
                    const endX = e.changedTouches[0].clientX;
                    const diff = this.startX - endX;

                    // إذا كانت السحبة قوية (أكثر من 15% من الشاشة)
                    if (Math.abs(diff) > window.innerWidth * 0.15) {
                        if (diff > 0) this.currentSlide = (this.currentSlide + 1) % this.slideCount;
                        else this.currentSlide = (this.currentSlide - 1 + this.slideCount) % this.slideCount;
                    }
                    this.moveSlider(this.currentSlide);
                    this.startAutoPlay();
                });

                this.startAutoPlay();
                this.updateDots(0);
            },

            startAutoPlay() {
                if (this.sliderInterval) clearInterval(this.sliderInterval);
                this.sliderInterval = setInterval(() => {
                    this.currentSlide = (this.currentSlide + 1) % this.slideCount;
                    this.moveSlider(this.currentSlide);
                }, 7000); // كل 7 ثواني
            },

            moveSlider(index) {
                const container = document.getElementById('hero-slider-container');
                if (container) {
                    container.style.transform = `translateX(${index * 100}%)`;
                    this.updateDots(index);
                }
            },

            jumpToSlide(index) {
                this.currentSlide = index;
                this.moveSlider(index);
                this.startAutoPlay();
            },

            updateDots(index) {
                const dots = document.querySelectorAll('.hero-dot');
                dots.forEach((dot, i) => {
                    dot.classList.toggle('active', i === index);
                });
            },

            async details(id) {
                const [item, cast] = await Promise.all([
                    fetch(`${API_BASE}/series/${id}`).then(r => r.json()),
                    fetch(`${API_BASE}/content/${id}/actors`).then(r => r.json())
                ]);

                // تحديد أول حلقة للتشغيل (سواء بمواسم أو بدون)
                const firstId = !item.isMovie && item.seasons?.length > 0
                    ? (item.episodes?.find(e => e.seasonId === item.seasons[0].id)?.id || '')
                    : (item.isMovie ? item.id : (item.episodes?.[0]?.id || ''));

                const progress = Math.round(localStorage.getItem(`prog_${firstId}`) || 0);
                const buttonText = progress > 0 && progress < 95 ? 'أكمل المشاهدة' : 'شاهد الآن';

                // حل مشكلة عرض حلقات الموسم الأول تلقائياً
                let initialEpisodesHtml = '';
                if (!item.isMovie) {
                    if (item.seasons?.length > 0) {
                        // حالة وجود مواسم: جلب حلقات الموسم الأول
                        const firstSznId = item.seasons[0].id;
                        initialEpisodesHtml = (item.episodes || [])
                            .filter(e => e.seasonId === firstSznId)
                            .map(ep => Views.episodeRow(ep)).join('');
                    } else if (item.episodes?.length > 0) {
                        // حالة مسلسل بدون مواسم: عرض الحلقات مباشرة
                        initialEpisodesHtml = item.episodes.map(ep => Views.episodeRow(ep)).join('');
                    }
                }

                setTimeout(() => {
                    const stickyHeader = document.getElementById('smart-sticky-header');
                    const tabSection = document.getElementById('sticky-tab-bar');
                    const originalNav = document.getElementById('seasons-nav-original');

                    window.onscroll = () => {
                        const navPos = originalNav ? originalNav.getBoundingClientRect().top : 0;
                        if (window.scrollY > 400) {
                            stickyHeader.style.transform = 'translateY(0)';
                            stickyHeader.style.opacity = '1';
                            if (navPos < 20 && item.seasons?.length > 0) {
                                stickyHeader.classList.add('h-36');
                                tabSection.classList.replace('hidden', 'flex');
                            } else {
                                stickyHeader.classList.remove('h-36');
                                tabSection.classList.replace('flex', 'hidden');
                            }
                        } else {
                            stickyHeader.style.transform = 'translateY(-100%)';
                            stickyHeader.style.opacity = '0';
                        }
                    };
                    if (item.seasons?.length > 0) Views.initSeasonMarker();
                }, 200);

                return `
                    <div class="min-h-screen relative pb-20 overflow-x-hidden">
                        <div id="smart-sticky-header" class="fixed top-0 left-0 right-0 md:right-24 z-[150] h-16 md:h-20 bg-white/5 backdrop-blur-xl border-b border-white/5 flex flex-col transition-all duration-500 translate-y-[-100%] opacity-0">
                            <div class="flex-1 flex items-center justify-between px-6 flex-row-reverse">
                                <div class="smart flex items-center gap-4 flex-row-reverse pr-20 md:pr-0">
                                    <img src="${item.poster}" class="w-10 h-14 object-cover rounded shadow-lg border border-white/10">
                                    <div class="text-right">
                                        <h2 class="text-white font-black text-sm truncate max-w-[150px]">${item.title}</h2>
                                        <div class="flex flex-row-reverse items-center gap-2">
                                            <span class="text-primary text-[10px] font-black italic">★ ${item.rating}</span>
                                            <span class="text-gray-500 text-[10px] font-bold">${item.year}</span>
                                        </div>
                                    </div>
                                </div>

            // دالة التبديل عند الضغط (إصلاح مشكلة العكس)
            async switchSeason(seasonId, seriesId, btn) {
                const marker = document.getElementById('season-marker');
                const container = document.getElementById('episodes-container');

                if (marker && btn) {
                    const isDesktop = window.innerWidth >= 1024;

                    marker.style.width = isDesktop ? `calc(100% - 12px)` : `${btn.offsetWidth}px`;
                    marker.style.height = isDesktop ? `${btn.offsetHeight}px` : `calc(100% - 12px)`;

                    if (isDesktop) {
                        marker.style.top = `${btn.offsetTop}px`;
                        marker.style.right = `6px`;
                    } else {
                        const offsetR = btn.parentElement.offsetWidth - (btn.offsetLeft + btn.offsetWidth);
                        marker.style.right = `${offsetR}px`;
                        marker.style.top = `6px`;
                    }
                }

                // تحديث الألوان
                document.querySelectorAll('.season-btn').forEach(b => {
                    b.classList.remove('text-black', 'active-season');
                    b.classList.add('text-gray-500');
                });
                btn.classList.add('text-black', 'active-season');
                btn.classList.remove('text-gray-500');

                // جلب الحلقات مع انميشن تلاشي
                container.style.opacity = '0.3';
                const res = await fetch(`${API_BASE}/episodes?seriesId=${seriesId}&seasonId=${seasonId}`);
                const eps = await res.json();
                container.innerHTML = eps.map(e => Views.episodeRow(e)).join('');
                container.style.opacity = '1';
            },

                setTimeout(() => {
                    const firstBtn = document.querySelector('.active-season');
